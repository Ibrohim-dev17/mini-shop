<!DOCTYPE html>
<html lang="uz">
<body>
    <h2>Saqlangan kategoriyalar</h2>
    <div id="list"></div>

    <script>
        fetch("https://api.npoint.io/1187b075e735a62911e8")
            .then(res => res.json())
            .then(data => {
                const list = document.getElementById('list');
                list.innerHTML = data.map(item => `
                    <div style="margin-bottom:20px;">
                        <img src="${item.img}" style="width:100px; border-radius:10px;">
                        <h3>${item.name}</h3>
                    </div>
                `).join('');
            });
    </script>
</body>
</html>
