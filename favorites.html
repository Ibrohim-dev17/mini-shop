<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sevimlilar</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="data.js"></script>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f6fa; color: #111;
}
a { text-decoration: none; color: inherit; }
* { box-sizing: border-box; }

.main-content {
  height: calc(100vh - 65px);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.9); backdrop-filter: blur(10px);
  padding: 14px; display: flex; align-items: center; gap: 15px;
  border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 10;
}
.back-btn { background: #6a5acd; color: white; padding: 6px 14px; border-radius: 50px; font-size: 13px; font-weight: 500; }
.header b { font-size: 18px; }

/* GRID */
.products { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px 12px 30px 12px; }
.card { background: white; border-radius: 14px; padding: 12px; text-align: center; box-shadow: 0 5px 12px rgba(0,0,0,0.04); position: relative; }
.card img { width: 100%; height: 110px; object-fit: contain; background: #fafafa; border-radius: 12px; padding: 8px; }
.card p { margin: 8px 0 4px 0; font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.price { color: #6a5acd; font-size: 14px; font-weight: 600; margin-bottom: 8px; }

/* SEVIMLILAR SHAFFOF YURAKCHASI */
.heart {
  position: absolute; top: 8px; right: 8px; width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; font-size: 18px; color: #ff3b30; z-index: 2;
}

/* SAVATGA QO'SHISH ICHKI TUGMASI */
.add-to-cart-btn {
  background: #f1f2f6; color: #6a5acd; border: none; width: 100%;
  padding: 8px; border-radius: 10px; font-size: 12px; font-weight: 600;
  transition: all 0.2s;
}
.add-to-cart-btn:active { background: #6a5acd; color: white; }

.empty-favs { text-align: center; padding: 60px 20px; color: #888; }
.empty-favs i { font-size: 50px; color: #ccc; margin-bottom: 12px; }

/* TOAST */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85); color: white; padding: 10px 24px;
  border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 2000;
  transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { top: 20px; }

/* BOTTOM NAV (Fav aktiv) */
.bottom {
  position: fixed; bottom: 0; left: 0; right: 0; height: 65px;
  background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px); display: flex; justify-content: space-around;
  align-items: center; border-top: 1px solid rgba(0, 0, 0, 0.04); z-index: 1000; padding: 0 10px;
}
.bottom a { color: #b0b0b5; font-size: 22px; display: flex; align-items: center; justify-content: center; width: 50px; height: 50px; border-radius: 16px; }
.bottom a.active { color: #6a5acd; background: rgba(106, 90, 205, 0.08); }
</style>
</head>
<body>

<div id="toast" class="toast">Savatga qo‘shildi!</div>

<div class="main-content">
  <div class="header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Orqaga</a>
    <b>Sevimlilar</b>
  </div>
  <div class="products" id="favBox"></div>
</div>

<div class="bottom">
  <a href="index.html"><i class="fa-solid fa-house"></i></a>
  <a href="categories.html"><i class="fa-solid fa-list"></i></a>
  <a href="cart.html"><i class="fa-solid fa-basket-shopping"></i></a>
  <a href="favorites.html" class="active"><i class="fa-solid fa-heart"></i></a>
</div>

<script>
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready(); Telegram.WebApp.expand();
  if (typeof Telegram.WebApp.disableVerticalSwipes === 'function') Telegram.WebApp.disableVerticalSwipes();
}

const box = document.getElementById("favBox");

function renderFavorites() {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  box.innerHTML = "";

  // data.js ichidagi barcha mahsulotlardan faqat IDsi sevimlilarda borini saralaymiz
  let favProducts = allProducts.filter(p => favs.includes(p.id));

  if (favProducts.length === 0) {
    box.innerHTML = `
      <div class="empty-favs">
        <i class="fa-solid fa-heart-crack"></i>
        <p>Sevimlilar ro'yxati bo'sh</p>
      </div>`;
    return;
  }

  favProducts.forEach(p => {
    box.innerHTML += `
    <div class="card">
      <div class="heart" onclick="removeFav('${p.id}')">
        <i class="fa-solid fa-heart"></i>
      </div>
      <a href="product.html?id=${p.id}">
        <img src="${p.img}">
        <p>${p.name}</p>
        <div class="price">${p.price.toLocaleString()} so'm</div>
      </a>
      <button class="add-to-cart-btn" onclick="addToCart(event, '${p.id}')">Savatga qo'shish</button>
    </div>`;
  });
}

function removeFav(id) {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  favs = favs.filter(x => x !== id);
  localStorage.setItem("favs", JSON.stringify(favs));
  
  window.dispatchEvent(new Event('favsUpdated'));
  renderFavorites();
}

function addToCart(e, id) {
  e.preventDefault();
  let p = allProducts.find(x => x.id === id);
  if (!p) return;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: p.id, name: p.name, price: p.price, img: p.img, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));
  
  if (typeof updateBottomBadges === 'function') {
    updateBottomBadges();
  }

  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); }, 1500);
}

renderFavorites();
</script>
</body>
</html>
