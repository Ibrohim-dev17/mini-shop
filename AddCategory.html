<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kategoriya qo'shish</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #6a11cb; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Yangi Kategoriya</h2>
        <input type="text" id="name" placeholder="Kategoriya nomi">
        
        <label style="font-size: 14px; color: #666;">Rasm tanlash (ixtiyoriy):</label>
        <input type="file" id="imgFile" accept="image/*">
        
        <button class="btn" onclick="save()">Saqlash</button>
    </div>

<script>
 function doGet() {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = sheet.getDataRange().getValues();
  // Sarlavhani o'tkazib yuborib, JSON formatida jo'natamiz
  var result = data.slice(1).map(function(row) {
    return { name: row[1], img: row[2] };
  });
  return ContentService.createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
  var data = JSON.parse(e.postData.contents);
  if (data.action == "addCategory") {
    sheet.appendRow([new Date(), data.name, data.img]);
    return ContentService.createTextOutput(JSON.stringify({status: "success"}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

</script>


</body>
</html>
