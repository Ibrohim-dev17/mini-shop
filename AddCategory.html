<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kategoriya qo'shish</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #6a11cb; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Yangi Kategoriya</h2>
        <input type="text" id="name" placeholder="Kategoriya nomi">
        
        <label style="font-size: 14px; color: #666;">Rasm tanlash (ixtiyoriy):</label>
        <input type="file" id="imgFile" accept="image/*">
        
        <button class="btn" onclick="save()">Saqlash</button>
    </div>

 <script>
    function save() {
        const name = document.getElementById('name').value;
        const fileInput = document.getElementById('imgFile');
        if(!name) return alert("Kategoriya nomini kiriting!");

        if(fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                // Rasm hajmini kichraytirish uchun Canvas ishlatamiz
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 200; // Rasm enini 200px qilib kichraytiramiz
                    const scale = MAX_WIDTH / img.width;
                    canvas.width = MAX_WIDTH;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7); // 70% sifat bilan saqlash
                    saveToDB(name, dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            saveToDB(name, 'https://via.placeholder.com/60');
        }
    }

    function saveToDB(name, imgData) {
        try {
            let db = JSON.parse(localStorage.getItem('adminDB')) || [];
            db.push({ name, img: imgData });
            localStorage.setItem('adminDB', JSON.stringify(db));
            window.location.href = 'SavedCategories.html';
        } catch(e) {
            alert("Xotira to'ldi yoki rasm juda katta!");
        }
    }
</script>

</body>
</html>
