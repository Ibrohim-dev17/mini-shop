<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kategoriya qo'shish</title>
    <style>
        body { font-family: sans-serif; padding: 20px; margin: 0; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: #6a11cb; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Yangi Kategoriya</h2>
        <input type="text" id="name" placeholder="Kategoriya nomi">
        
        <label style="font-size: 14px; color: #666;">Rasm tanlash (ixtiyoriy):</label>
        <input type="file" id="imgFile" accept="image/*">
        
        <button class="btn" onclick="save()">Saqlash</button>
    </div>

<script>
    // Siz yuborgan to'g'ri havola
    const API_URL = "https://script.google.com/macros/s/AKfycbyO_0Xgm0sz6j3-GGzpM_SKYXVCAUqo0go8l0irGq_8AN-lZAh3ImnnlGrY1Byrljvy8g/exec";

    function save() {
        const name = document.getElementById('name').value;
        const fileInput = document.getElementById('imgFile');
        
        if(!name) return alert("Iltimos, kategoriya nomini kiriting!");

        if(fileInput.files && fileInput.files[0]) {
            const reader = new FileReader();
            reader.onload = function(e) {
                sendToGoogleSheets(name, e.target.result);
            };
            reader.readAsDataURL(fileInput.files[0]);
        } else {
            sendToGoogleSheets(name, ""); 
        }
    }

    function sendToGoogleSheets(name, imgData) {
        // Ma'lumotni Google Sheets'ga yuborish
        fetch(API_URL, {
            method: "POST",
            mode: 'no-cors',
            body: JSON.stringify({ 
                action: "addCategory", 
                name: name, 
                img: imgData 
            })
        })
        .then(() => {
            alert("Muvaffaqiyatli saqlandi!");
            window.location.href = 'SavedCategories.html';
        })
        .catch(err => alert("Xatolik yuz berdi: " + err));
    }
</script>


</body>
</html>
