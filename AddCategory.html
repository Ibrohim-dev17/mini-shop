<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { 
            font-family: sans-serif; padding: 20px; margin: 0; 
            background: #f0f2f5; overflow-x: hidden; touch-action: manipulation;
        }
        .box { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #28a745; color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Yangi Kategoriya</h2>
        <input type="text" id="name" placeholder="Kategoriya nomi">
        <input type="file" id="imgFile" accept="image/*">
        <button id="saveBtn" onclick="saveData()">Saqlash</button>
    </div>

    <script>
        async function saveData() {
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('name').value;
            const file = document.getElementById('imgFile').files[0];
            
            if (!name || !file) return alert("Hamma maydonni to'ldiring!");

            btn.innerText = "Yuklanmoqda...";
            btn.disabled = true;

            try {
                // 1. Rasmni ImgBB ga yuklash
                const formData = new FormData();
                formData.append("image", file);
                const res = await fetch("https://api.imgbb.com/1/upload?key=8730999818818228399e527011d82137", {
                    method: "POST", body: formData
                });
                const imgData = await res.json();
                const imgUrl = imgData.data.url;

                // 2. Npoint dan eski ma'lumotni olish
                const dbUrl = "https://api.npoint.io/1187b075e735a62911e8";
                const getRes = await fetch(dbUrl);
                let data = await getRes.json();
                
                // 3. Yangisini qo'shish va yuborish
                data.push({ name: name, img: imgUrl });

                await fetch(dbUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });

                alert("Muvaffaqiyatli saqlandi!");
                window.location.href = 'SavedCategories.html';
            } catch (err) {
                alert("Xatolik: " + err);
                btn.innerText = "Saqlash";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
