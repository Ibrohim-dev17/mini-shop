<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kategoriya qo'shish</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f0f2f5; }
        input, button { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid #ccc; }
        button { background: #28a745; color: white; border: none; font-weight: bold; }
    </style>
</head>
<body>
    <h2>Yangi Kategoriya</h2>
    <input type="text" id="name" placeholder="Kategoriya nomi">
    <input type="file" id="imgFile" accept="image/*">
    <button onclick="saveData()">Saqlash</button>

    <script>
        async function saveData() {
            const name = document.getElementById('name').value;
            const file = document.getElementById('imgFile').files[0];
            if (!name || !file) return alert("Nom va rasm tanlang!");

            // 1. Rasmni ImgBB ga yuklash (Link olish uchun)
            const formData = new FormData();
            formData.append("image", file);
            const res = await fetch("https://api.imgbb.com/1/upload?key=8730999818818228399e527011d82137", {
                method: "POST", body: formData
            });
            const imgData = await res.json();
            const imgUrl = imgData.data.url;

            // 2. Npoint ga ma'lumotni qo'shish
            const dbUrl = "https://api.npoint.io/1187b075e735a62911e8";
            const response = await fetch(dbUrl);
            let data = await response.json();
            data.push({ name: name, img: imgUrl });

            await fetch(dbUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            });

            alert("Muvaffaqiyatli saqlandi!");
            window.location.href = 'SavedCategories.html';
        }
    </script>
</body>
</html>
