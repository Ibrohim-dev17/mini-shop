<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Sotuvchi Paneli</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
html, body {
  margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
  font-family: system-ui, -apple-system, sans-serif; background: #f8f9fa; color: #111;
}
* { box-sizing: border-box; }

/* ASOSIY KONTEYNER (SKROL BO'LADIGAN) */
.admin-container {
  height: 100vh; overflow-y: auto; padding: 16px; padding-bottom: 40px; display: none;
  -webkit-overflow-scrolling: touch; overscroll-behavior-y: contain;
}

/* RUXSAT BERILMAGANDA CHIQADIGAN BLOK */
.denied-container {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  height: 100vh; text-align: center; padding: 20px; background: #fff;
}
.denied-container i { font-size: 60px; color: #ff3b30; margin-bottom: 15px; }

h2 { font-size: 20px; font-weight: 700; margin: 10px 0 20px 0; color: #6a5acd; display: flex; align-items: center; gap: 10px; }

/* INSTAGRAM STYLE FORMA */
.post-card {
  background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.04); margin-bottom: 24px;
  border: 1px solid rgba(0,0,0,0.03);
}
.input-group { margin-bottom: 16px; }
.input-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
.input-group input, .input-group select, .input-group textarea {
  width: 100%; padding: 12px 14px; border: 1px solid #e2e8f0; border-radius: 12px; outline: none; font-size: 14px; font-family: inherit; background: #fdfdfd; transition: all 0.2s;
}
.input-group input:focus, .input-group select:focus, .input-group textarea:focus { border-color: #6a5acd; background: #fff; box-shadow: 0 0 0 3px rgba(106, 90, 205, 0.1); }

.publish-btn {
  background: #6a5acd; color: white; border: none; width: 100%; padding: 14px; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; box-shadow: 0 4px 12px rgba(106, 90, 205, 0.2); transition: all 0.2s;
}
.publish-btn:active { transform: scale(0.98); background: #574bba; }

/* MAHSULOTLAR RO'YXATI CHIZIG'I */
.list-title { font-size: 16px; font-weight: 700; margin: 20px 0 12px 0; color: #333; display: flex; align-items: center; justify-content: space-between; }
.refresh-btn { background: none; border: none; color: #6a5acd; font-size: 14px; font-weight: 600; cursor: pointer; }

.prod-item {
  background: white; border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.02); border: 1px solid rgba(0,0,0,0.01);
}
.prod-item img { width: 55px; height: 55px; object-fit: contain; background: #fafafa; border-radius: 10px; padding: 4px; }
.prod-details { flex: 1; min-width: 0; }
.prod-details h4 { margin: 0 0 4px 0; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #222; }
.prod-details span { color: #6a5acd; font-weight: 700; font-size: 13px; }
.delete-btn { color: #ff3b30; background: rgba(255,59,48,0.08); border: none; padding: 8px 14px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s; }
.delete-btn:active { transform: scale(0.95); background: rgba(255,59,48,0.15); }

/* TOAST (BILDIRIShNOMA) */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 10px 24px; border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 2000; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; align-items: center; gap: 8px;
}
.toast.show { top: 20px; }
</style>
</head>
<body>

<div id="toast" class="toast"><i class="fa-solid fa-circle-check" style="color:#34c759;"></i> Muvaffaqiyatli bajarildi!</div>

<div id="accessDenied" class="denied-container">
  <i class="fa-solid fa-shield-halved"></i>
  <h3 style="margin:0 0 8px 0; font-size: 20px;">Kirish taqiqlangan</h3>
  <p style="margin:0; color:#777; font-size:14px; line-height: 1.4;">Siz ushbu maxfiy bo‘limga kirish<br>huquqiga ega emassiz. ⚠️</p>
</div>

<div id="adminApp" class="admin-container">
  <h2><i class="fa-solid fa-square-plus"></i> Yangi tovar qo‘shish</h2>
  
  <div class="post-card">
    <div class="input-group">
      <label>Kategoriya tanlang</label>
      <select id="pCategory">
        <option value="termos">Termoslar</option>
        <option value="blender">Blenderlar</option>
        <option value="qozon">Qozonlar</option>
        <option value="mikser">Mikserlar</option>
        <option value="idishlar">Idishlar</option>
      </select>
    </div>

    <div class="input-group">
      <label>Mahsulot nomi</label>
      <input type="text" id="pName" placeholder="Masalan: Premium Termos 1L">
    </div>

    <div class="input-group">
      <label>Narxi (faqat raqamda, so'm)</label>
      <input type="number" id="pPrice" placeholder="Masalan: 150000">
    </div>

    <div class="input-group">
      <label>Rasm havolasi (URL)</label>
      <input type="text" id="pImg" placeholder="https://i.ibb.co/... rasm manzili">
    </div>

    <div class="input-group">
      <label>Tavsif / Batafsil ma'lumot</label>
      <textarea id="pDesc" rows="3" placeholder="Mahsulot xususiyatlari haqida yozing..."></textarea>
    </div>

    <button class="publish-btn" onclick="publishProduct()">
      <i class="fa-solid fa-paper-plane"></i> Instagramdek joylash
    </button>
  </div>

  <div class="list-title">
    <span>Mavjud tovarlar</span>
    <button class="refresh-btn" onclick="loadProductsList()"><i class="fa-solid fa-rotate"></i> Yangilash</button>
  </div>
  <div id="activeProductsBox"></div>
</div>

<script>
// ⚠️ JUDA MUHIM: BU YERGA GOOGLE APPS SCRIPT'DAN OLGAN WEB APP URL MANZILINI QO'YING!
const API_URL = "BU_YERGA_O_ZINGIZNING_WEB_APP_URL_MANZILINI_QO_YING";

// ⚠️ ADMIN TELEGRAM ID RAQAMI (O'zingiznikini qo'ying)
const ADMIN_ID = 7779592134; 

let currentUserId = null;

// Telegram WebApp sozlamalari
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (Telegram.WebApp.initDataUnsafe && Telegram.WebApp.initDataUnsafe.user) {
    currentUserId = Telegram.WebApp.initDataUnsafe.user.id;
  }
}

// TEST: Agar ID 0 bo'lsa, demak Telegram noto'g'ri ulangan
if (currentUserId == 7779592134) {
  document.getElementById("accessDenied").style.display = "none";
  document.getElementById("adminApp").style.display = "block";
  loadProductsList();
} else {
  // Agar ID noto'g'ri bo'lsa, sahifada o'sha ID ni ko'rsatib beradi
  document.getElementById("accessDenied").style.display = "flex";
  document.body.innerHTML = "<h1>Sizning IDingiz: " + currentUserId + "</h1><p>Admin ID: 7779592134</p>";
}


// Bildirishnoma chiqarish funksiyasi
function showToast(text, isError = false) {
  const t = document.getElementById("toast");
  t.innerHTML = isError ? `<i class="fa-solid fa-circle-xmark" style="color:#ff3b30;"></i> ${text}` : `<i class="fa-solid fa-circle-check" style="color:#34c759;"></i> ${text}`;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2000);
}

// 1. BAZADAN (GOOGLE SHEETS) TOVARLARNI YUKLASH
function loadProductsList() {
  const box = document.getElementById("activeProductsBox");
  box.innerHTML = "<p style='text-align:center; color:#888; font-size:14px; padding:20px;'><i class='fa-solid fa-spinner fa-spin'></i> Yuklanmoqda...</p>";

  fetch(API_URL)
    .then(res => res.json())
    .then(data => {
      box.innerHTML = "";
      if(!data || data.length === 0) {
        box.innerHTML = "<p style='text-align:center; color:#999; font-size:13px; padding:20px;'>Hozircha omborda tovarlar yo'q.</p>";
        return;
      }
      data.forEach(p => {
        box.innerHTML += `
          <div class="prod-item" id="item-${p.id}">
            <img src="${p.img || 'https://via.placeholder.com/50'}" onerror="this.src='https://via.placeholder.com/50'">
            <div class="prod-details">
              <h4>${p.name}</h4>
              <span>${Number(p.price).toLocaleString()} so'm</span>
            </div>
            <button class="delete-btn" onclick="deleteProduct('${p.id}')">O'chirish</button>
          </div>`;
      });
    }).catch(() => {
      box.innerHTML = "<p style='text-align:center; color:#ff3b30; font-size:13px; padding:20px;'>Ma'lumotlarni yuklashda xatolik yuz berdi!</p>";
    });
}

// 2. YANGI TOVAR QO'SHISH (POST QILISH)
function publishProduct() {
  const cat = document.getElementById("pCategory").value;
  const name = document.getElementById("pName").value.trim();
  const price = document.getElementById("pPrice").value.trim();
  const img = document.getElementById("pImg").value.trim();
  const desc = document.getElementById("pDesc").value.trim();

  if(!name || !price || !img) {
    alert("Iltimos, mahsulot nomi, narxi va rasmini albatta kiriting!");
    return;
  }

  const generatedId = "p_" + Date.now(); // Unikal ID yaratish
  const postData = { action: "add", id: generatedId, category: cat, name: name, price: price, img: img, desc: desc };

  showToast("Baza yangilanmoqda...");

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify(postData)
  })
  .then(res => res.json())
  .then(res => {
    if(res.status === "success") {
      showToast("Muvaffaqiyatli joylandi! 🚀");
      
      // Kiritish maydonlarini tozalash
      document.getElementById("pName").value = "";
      document.getElementById("pPrice").value = "";
      document.getElementById("pImg").value = "";
      document.getElementById("pDesc").value = "";
      
      loadProductsList(); // Ro'yxatni avtomatik yangilash
    } else {
      showToast("Saqlashda xatolik!", true);
    }
  }).catch(() => showToast("Server bilan aloqa uzildi!", true));
}

// 3. TOVARNI BAZADAN O'CHIRISH
function deleteProduct(id) {
  if(!confirm("Ushbu mahsulotni o'chirishga ishonchingiz komilmi?")) return;

  showToast("O'chirilmoqda...");

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ action: "delete", id: id })
  })
  .then(res => res.json())
  .then(res => {
    if(res.status === "deleted") {
      showToast("Tovar o'chirildi! 🗑️");
      const element = document.getElementById(`item-${id}`);
      if(element) element.remove(); // Ekrandan o'chirish
    } else {
      showToast("O'chirish ilojsiz bo'ldi", true);
    }
  }).catch(() => showToast("Xatolik yuz berdi!", true));
}
</script>

</body>
</html>
