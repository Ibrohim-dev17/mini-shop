<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main: #6a5acd; }
        body { font-family: system-ui; background: #f4f4f9; padding: 20px; }
        
        /* Kategoriya paneli uchun yangi uslublar */
        .category-container {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto; /* Agar juda ko'p bo'lsa scroll qiladi */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        
        .add-btn {
            background: var(--main);
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            flex-shrink: 0;
            font-size: 20px;
        }

        .category-item {
            background: #eee;
            padding: 8px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .category-item i { cursor: pointer; color: #ff6b6b; }
    </style>
</head>
<body>

<div class="category-container">
    <div class="add-btn" onclick="addCategoryPrompt()">
        <i class="fas fa-plus"></i>
    </div>
    
    <div id="categoryList" style="display: flex; gap: 10px;">
        </div>
</div>

<script>
    let categories = ["Elektronika", "Kiyim-kechak", "Uy buyumlari"];

    function renderCategories() {
        const list = document.getElementById('categoryList');
        list.innerHTML = categories.map(cat => `
            <div class="category-item">
                ${cat}
                <i class="fas fa-times" onclick="removeCategory('${cat}')"></i>
            </div>
        `).join('');
    }

    function addCategoryPrompt() {
        const name = prompt("Yangi kategoriya nomi:");
        if (name) {
            categories.push(name);
            renderCategories();
        }
    }

    function removeCategory(name) {
        categories = categories.filter(c => c !== name);
        renderCategories();
    }

    // Boshlang'ich render
    renderCategories();
</script>

</body>
</html>
