<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel</title>
    <style>
        html, body {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: 'Segoe UI', sans-serif; background: #f0f2f5;
        }
        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 20px; align-items: center; }
        
        /* ZAMONAVIY TUGMA STILI */
        .btn-modern {
            width: 100%; max-width: 400px; padding: 20px; font-size: 18px; font-weight: 600;
            border: none; border-radius: 16px; cursor: pointer; color: white;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        .add-btn { background: linear-gradient(135deg, #6a11cb, #2575fc); cursor: not-allowed; opacity: 0.8; }
        .list-btn { background: linear-gradient(135deg, #11998e, #38ef7d); }
        
        .btn-modern:active { transform: scale(0.97); }

        #cat-list { width: 100%; max-width: 400px; flex-grow: 1; overflow-y: auto; margin-top: 10px; }
        .cat-item { 
            background: white; padding: 15px; margin-bottom: 10px; border-radius: 12px;
            display: flex; justify-content: space-between; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container" id="cat-view">
    <button class="btn-modern add-btn" onclick="return false;">+ Kategoriya qo'shish</button>
    
    <button class="btn-modern list-btn" onclick="toggleList()">📂 Kiritilgan kategoriyalar</button>
    
    <div id="cat-list" class="hidden"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('adminDB')) || { "Misol Kategoriya": [] }; 

    function toggleList() {
        const listDiv = document.getElementById('cat-list');
        listDiv.classList.toggle('hidden');
        renderCategories();
    }

    function renderCategories() {
        const list = document.getElementById('cat-list');
        list.innerHTML = Object.keys(db).map(cat => `
            <div class="cat-item">
                <span style="font-weight:bold;">${cat}</span>
            </div>
        `).join('');
    }
</script>

</body>
</html>
