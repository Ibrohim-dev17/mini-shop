<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>
    <style>
        body { font-family: sans-serif; display: flex; height: 100vh; margin: 0; }
        
        /* Chap menyu */
        .sidebar { width: 250px; background: #333; color: white; padding: 20px; }
        .menu-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #444; }
        .menu-item:hover { background: #444; }

        /* Asosiy kontent */
        .content { flex-grow: 1; padding: 30px; background: #f4f4f4; }
        .page { display: none; }
        .page.active { display: block; }

        /* Kategoriya stilgi */
        .category-card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px #ccc; }
        .cat-list { margin-top: 20px; }
        .cat-item { padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="sidebar">
    <h3>Admin Panel</h3>
    <div class="menu-item" onclick="showPage('dashboard')">Bosh sahifa</div>
    <div class="menu-item" onclick="showPage('categories')">Kategoriyalar</div>
</div>

<div class="content">
    <div id="categories" class="page">
        <div class="category-card">
            <h2>Kategoriyalar Boshqaruvi</h2>
            <button onclick="addCategory()">+ Yangi Kategoriya qo'shish</button>
            
            <div class="cat-list" id="cList">
                </div>
        </div>
    </div>
</div>

<script>
    let categories = [];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function addCategory() {
        const name = prompt("Kategoriya nomini kiriting:");
        if (name) {
            categories.push(name);
            renderList();
        }
    }

    function renderList() {
        const list = document.getElementById('cList');
        list.innerHTML = categories.map(c => `
            <div class="cat-item">
                <span>${c}</span>
                <button onclick="deleteCategory('${c}')">O'chirish</button>
            </div>
        `).join('');
    }
</script>
</body>
</html>
