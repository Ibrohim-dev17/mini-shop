<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --main: #6a5acd; }
        body { font-family: system-ui; background: #f4f4f9; padding: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 15px; margin-bottom: 20px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 8px; border: none; background: #ddd; cursor: pointer; }
        .tab-btn.active { background: var(--main); color: #fff; }
        .content-section { display: none; }
        .content-section.active { display: block; }
        .item-row { display: flex; align-items: center; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
        .status-badge { padding: 4px 8px; border-radius: 5px; font-size: 12px; }
        .status-active { background: #d4edda; color: #155724; }
        .status-sleep { background: #fff3cd; color: #856404; }
    </style>
</head>
<body>

<div class="tabs">
    <button class="tab-btn active" onclick="showSection('products')">Mahsulotlar</button>
    <button class="tab-btn" onclick="showSection('categories')">Kategoriyalar</button>
</div>

<!-- Mahsulotlar Bo'limi -->
<section id="products" class="content-section active">
    <div class="card">
        <h3>Yangi Mahsulot</h3>
        <input type="text" id="pName" placeholder="Nomi" style="width:100%; margin-bottom:10px; padding:8px;">
        <input type="file" id="pImgFile" accept="image/*" style="margin-bottom:10px;">
        <button onclick="saveProduct()" class="tab-btn active">Saqlash</button>
    </div>
    <div id="pList"></div>
</section>

<!-- Kategoriyalar Bo'limi -->
<section id="categories" class="content-section">
    <div class="card">
        <h3>Kategoriya qo'shish</h3>
        <input type="text" id="catName" placeholder="Kategoriya nomi">
        <button onclick="saveCategory()" class="tab-btn active">Qo'shish</button>
    </div>
    <div id="cList"></div>
</section>

<script>
function showSection(id) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
}

// Rasm yuklash (Base64 ga o'girish)
function getBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

async function saveProduct() {
    const file = document.getElementById('pImgFile').files[0];
    let imgBase64 = "";
    if (file) imgBase64 = await getBase64(file);
    
    // Serverga yuborish logikasi...
    console.log("Ma'lumot:", { name: document.getElementById('pName').value, img: imgBase64 });
    alert("Saqlandi!");
}

function saveCategory() {
    const name = document.getElementById('catName').value;
    // Baza logikasi...
    alert("Kategoriya qo'shildi: " + name);
}
</script>
</body>
</html>
