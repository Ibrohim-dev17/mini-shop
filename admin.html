<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Panel</title>
    <style>
        /* EKRAN SURILMASLIGI UCHUN */
        html, body {
            margin: 0; padding: 0; height: 100%; overflow: hidden;
            font-family: sans-serif; background: #fff;
        }
        .app-container { height: 100vh; display: flex; flex-direction: column; padding: 20px; }
        
        /* TUGMA STILI */
        .btn-add {
            width: 100%; padding: 25px; font-size: 18px; font-weight: bold;
            background: #6a5acd; color: white; border: none; border-radius: 12px;
            cursor: pointer; margin-bottom: 20px;
        }
        .btn-add:active { transform: scale(0.98); }

        /* RO'YXAT STILI */
        #cat-list { flex-grow: 1; overflow-y: auto; }
        .cat-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="app-container" id="cat-view">
    <button class="btn-add" onclick="addCategory()">+ Kategoriya qo'shish</button>
    <div id="cat-list"></div>
</div>

<div class="app-container hidden" id="prod-view">
    <button class="btn-add" style="background:#555;" onclick="goBack()">⬅️ Orqaga</button>
    <h2 id="cat-title"></h2>
    <input type="text" id="pName" style="width:100%; padding:15px; box-sizing:border-box; border:1px solid #ccc; border-radius:8px;" placeholder="Mahsulot nomi">
    <button class="btn-add" style="margin-top:10px;" onclick="addProduct()">Mahsulot qo'shish</button>
    <div id="prod-list" style="overflow-y:auto; margin-top:10px;"></div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('adminDB')) || {}; 
    let activeCat = "";

    function addCategory() {
        const name = prompt("Kategoriya nomi:");
        if(name && !db[name]) { db[name] = []; save(); renderCategories(); }
    }

    function renderCategories() {
        document.getElementById('cat-list').innerHTML = Object.keys(db).map(cat => `
            <div class="cat-item">
                <span onclick="openCategory('${cat}')" style="font-weight:bold;">${cat}</span>
                <button onclick="deleteCat('${cat}')" style="color:red; border:none; background:none;">O'chirish</button>
            </div>
        `).join('');
    }

    function openCategory(name) {
        activeCat = name;
        document.getElementById('cat-title').innerText = name;
        document.getElementById('cat-view').classList.add('hidden');
        document.getElementById('prod-view').classList.remove('hidden');
        renderProducts();
    }

    function goBack() {
        document.getElementById('cat-view').classList.remove('hidden');
        document.getElementById('prod-view').classList.add('hidden');
    }

    function addProduct() {
        const input = document.getElementById('pName');
        if(input.value) {
            db[activeCat].push(input.value);
            input.value = "";
            save(); renderProducts();
        }
    }

    function renderProducts() {
        document.getElementById('prod-list').innerHTML = db[activeCat].map((p, i) => `
            <div class="cat-item">${p} <button onclick="delProd(${i})" style="color:red; border:none; background:none;">O'chirish</button></div>
        `).join('');
    }

    function save() { localStorage.setItem('adminDB', JSON.stringify(db)); }
    function deleteCat(name) { delete db[name]; save(); renderCategories(); }
    function delProd(i) { db[activeCat].splice(i, 1); save(); renderProducts(); }
    
    renderCategories();
</script>

</body>
</html>
