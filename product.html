<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mahsulot tafsilotlari</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <style>
        /* ... Oldingi stillar ... */
        .counter { display: flex; align-items: center; justify-content: center; gap: 15px; margin: 20px 0; }
        .counter button { width: 40px; height: 40px; border: none; border-radius: 12px; background: #eee; font-size: 20px; cursor: pointer; }
        .bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 65px; background: white; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #eee; padding: 0 20px; z-index: 1000; }
        .bottom i { font-size: 24px; color: #6a5acd; }
    </style>
</head>
<body>

<div class="main-content">
  <div class="header"><div onclick="history.back()" class="back-btn">Orqaga</div></div>
  
  <div class="product-container">
    <div class="image-box">
      <div class="heart" id="favBtn" onclick="toggleFav()"><i class="fa-regular fa-heart"></i></div>
      <img id="pImg" src="">
    </div>
    
    <div class="details-box">
      <div class="name" id="pName"></div>
      <div class="price" id="pPrice"></div>
      
      <div class="counter">
        <button onclick="updateQty(-1)">-</button>
        <span id="qty" style="font-size: 18px; font-weight: bold;">1</span>
        <button onclick="updateQty(1)">+</button>
      </div>

      <button class="add-btn" onclick="addToCart()">Savatga qo‘shish</button>
    </div>
  </div>
</div>

<div class="bottom">
    <a href="index.html"><i class="fa-solid fa-house"></i></a>
    <a href="cart.html"><i class="fa-solid fa-cart-shopping"></i></a>
    <a href="profile.html"><i class="fa-solid fa-user"></i></a>
</div>

<script>
    let qty = 1;

    // Yurakcha funksiyasi
    function toggleFav() {
        const btn = document.getElementById('favBtn');
        btn.classList.toggle('active');
        const icon = btn.querySelector('i');
        icon.classList.toggle('fa-regular');
        icon.classList.toggle('fa-solid');
    }

    // Sonni o'zgartirish
    function updateQty(val) {
        qty = Math.max(1, qty + val);
        document.getElementById('qty').innerText = qty;
    }

    // Savatga qo'shish
    function addToCart() {
        alert("Mahsulot savatga qo'shildi: " + qty + " ta");
        // Bu yerda localStorage yoki Telegram API orqali ma'lumotni saqlaysiz
    }
</script>
</body>
</html>
