<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mahsulot tafsilotlari</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>
<style>
html, body { margin: 0; padding: 0; background: #f5f6fa; font-family: sans-serif; }
.main-content { padding-bottom: 80px; }
.image-box { background: white; margin: 12px; border-radius: 24px; padding: 20px; position: relative; text-align: center; }
.image-box img { width: 100%; max-width: 280px; }
.heart { position: absolute; top: 15px; right: 15px; font-size: 24px; color: #b0b0b5; cursor: pointer; }
.heart.active { color: #ff3b30; }
.details-box { background: white; margin: 12px; border-radius: 24px; padding: 20px; }
.rating-box { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
.stars { color: #ffc107; }
.counter { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
.counter button { width: 40px; height: 40px; border-radius: 12px; border: none; background: #eee; font-size: 20px; }
.add-btn { background: #6a5acd; color: white; padding: 15px; border-radius: 16px; border: none; width: 100%; font-size: 16px; }
</style>
</head>
<body>

<div class="main-content">
  <div class="image-box">
    <div class="heart" id="favBtn" onclick="toggleFav()"><i class="fa-regular fa-heart"></i></div>
    <img id="pImg" src="">
  </div>
  <div class="details-box">
    <h2 id="pName"></h2>
    <div class="rating-box">
      <div class="stars" id="pStars"></div>
      <span id="pRating"></span>
    </div>
    <div id="pPrice" style="font-weight:bold; font-size:20px; color:#6a5acd;"></div>
    <p id="pDesc"></p>
    <div class="counter">
      <button onclick="minus()">-</button>
      <span id="counter">1</span>
      <button onclick="plus()">+</button>
    </div>
    <button class="add-btn" onclick="addToCart()">Savatga qo‘shish</button>
  </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const product = allProducts.find(p => String(p.id) === String(urlParams.get("id")));
let count = 1;

if (product) {
  document.getElementById("pName").innerText = product.name;
  document.getElementById("pPrice").innerText = product.price.toLocaleString() + " so'm";
  document.getElementById("pImg").src = product.img;
  document.getElementById("pDesc").innerText = product.desc;
  
  // Rating
  let starsHtml = "";
  for(let i=1; i<=5; i++) starsHtml += i <= Math.round(product.rating) ? '<i class="fa-solid fa-star"></i>' : '<i class="fa-regular fa-star"></i>';
  document.getElementById("pStars").innerHTML = starsHtml;
  document.getElementById("pRating").innerText = `${product.rating} (${product.reviewsCount} ta sharh)`;

  // Fav tekshiruv
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  if(favs.includes(product.id)) document.getElementById("favBtn").classList.add("active");
}

function plus() { count++; document.getElementById("counter").innerText = count; }
function minus() { if(count > 1) count--; document.getElementById("counter").innerText = count; }

function toggleFav() {
  let favs = JSON.parse(localStorage.getItem("favs")) || [];
  const btn = document.getElementById("favBtn");
  if(favs.includes(product.id)) {
    favs = favs.filter(id => id !== product.id);
    btn.classList.remove("active");
  } else {
    favs.push(product.id);
    btn.classList.add("active");
  }
  localStorage.setItem("favs", JSON.stringify(favs));
}

function addToCart() {
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(i => i.id === product.id);
  if(item) item.qty += count;
  else cart.push({...product, qty: count});
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Savatga qo'shildi!");
}
</script>
</body>
</html>
