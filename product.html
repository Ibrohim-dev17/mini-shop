<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

.header{
background:white;
padding:14px;
}

.back-btn{
text-decoration:none;
background:#6a5acd;
color:white;
padding:7px 14px;
border-radius:50px;
font-size:13px;
font-weight:600;
}

.product{
background:white;
margin:12px;
border-radius:16px;
padding:16px;
text-align:center;
}

.product img{
width:200px;
border-radius:14px;
}

.name{
font-size:18px;
margin-top:10px;
}

.price{
color:#6a5acd;
font-weight:600;
margin-top:6px;
}

.desc{
margin-top:10px;
font-size:14px;
color:#555;
}

.counter{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
margin-top:14px;
}

.counter button{
width:34px;
height:34px;
border:none;
border-radius:8px;
background:#6a5acd;
color:white;
font-size:18px;
}

.add-btn{
margin-top:14px;
background:#6a5acd;
color:white;
padding:12px;
border-radius:12px;
border:none;
width:100%;
font-size:15px;
}

</style>
</head>

<body>

<div class="header">
<a href="products.html" class="back-btn">← Back</a>
</div>

<div class="product">

<img id="pImg">

<div class="name" id="pName"></div>
<div class="price" id="pPrice"></div>

<div class="desc" id="pDesc"></div>

<div class="counter">
<button onclick="minus()">-</button>
<span id="counter">1</span>
<button onclick="plus()">+</button>
</div>

<button class="add-btn" onclick="addToCart()">Savatga qo‘shish</button>

</div>

<script>

/* URL dan ID olish */

const url = new URLSearchParams(window.location.search);
const id = url.get("id");

/* Barcha mahsulotlar */

const allProducts = [

{id:"termos1", name:"Termos 1L", price:"120 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"1 litr termos. 12 soat issiq saqlaydi."},
{id:"termos2", name:"Termos 2L", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"2 litr katta termos. Sayohat uchun zo‘r."},
{id:"termos3", name:"Sport Termos", price:"110 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Sport uchun yengil termos."},

{id:"blender1", name:"Blender 3x1", price:"220 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"3 ta funksiyali blender."},
{id:"blender2", name:"Mini Blender", price:"160 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Mini blender. Oshxona uchun qulay."},
{id:"blender3", name:"Professional Blender", price:"390 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Professional kuchli blender."},

{id:"qozon1", name:"Qozon 5L", price:"180 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"5 litr qozon. Qalin temir."},
{id:"qozon2", name:"Qozon 10L", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"10 litr katta qozon."},

{id:"mikser1", name:"Mikser 5 Speed", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"5 tezlikli mikser."},
{id:"mikser2", name:"Mini Mikser", price:"95 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Kichik mikser. Arzon variant."},

{id:"idish1", name:"Idishlar To‘plami", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Oshxona uchun idishlar komplekti."},
{id:"idish2", name:"Premium Idishlar", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png", desc:"Premium sifatli idishlar."}

];

/* Tanlangan mahsulotni topish */

const product = allProducts.find(p => p.id === id);

/* Agar topilsa chiqarish */

if(product){
document.getElementById("pName").innerText = product.name;
document.getElementById("pPrice").innerText = product.price + " so'm";
document.getElementById("pImg").src = product.img;
document.getElementById("pDesc").innerText = product.desc;
}

/* Counter */

let count = 1;

function plus(){
count++;
document.getElementById("counter").innerText = count;
}

function minus(){
if(count > 1){
count--;
document.getElementById("counter").innerText = count;
}
}

/* SAVATGA QO‘SHISH */

function addToCart(){

let name = document.getElementById("pName").innerText;
let price = document.getElementById("pPrice").innerText;
let img = document.getElementById("pImg").src;
let qty = document.getElementById("counter").innerText;

let cart = JSON.parse(localStorage.getItem("cart")) || [];

cart.push({
name:name,
price:price,
img:img,
qty:qty
});

localStorage.setItem("cart", JSON.stringify(cart));

alert("Mahsulot savatga qo‘shildi");

}

</script>

</body>
</html>
