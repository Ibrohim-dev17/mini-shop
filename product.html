<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

.header{
background:white;
padding:14px;
}

.back-btn{
text-decoration:none;
background:#6a5acd;
color:white;
padding:7px 14px;
border-radius:50px;
font-size:13px;
font-weight:600;
}

.product{
background:white;
margin:12px;
border-radius:16px;
padding:16px;
text-align:center;
}

.product img{
width:200px;
border-radius:14px;
}

.name{
font-size:18px;
margin-top:10px;
}

.price{
color:#6a5acd;
font-weight:600;
margin-top:6px;
}

.desc{
margin-top:10px;
font-size:14px;
color:#555;
}

.counter{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
margin-top:14px;
}

.counter button{
width:34px;
height:34px;
border:none;
border-radius:8px;
background:#6a5acd;
color:white;
font-size:18px;
}

.add-btn{
margin-top:14px;
background:#6a5acd;
color:white;
padding:12px;
border-radius:12px;
border:none;
width:100%;
font-size:15px;
}

</style>
</head>

<body>

<div class="header">
<a href="products.html" class="back-btn">← Back</a>
</div>

<div class="product">

<img id="img">

<div class="name" id="name"></div>
<div class="price" id="price"></div>

<div class="desc">
Issiq suvni 12 soat issiq saqlaydi. Zanglamaydigan po‘latdan tayyorlangan.
</div>

<div class="counter">
<button onclick="minus()">-</button>
<span id="count">1</span>
<button onclick="plus()">+</button>
</div>

<button class="add-btn" onclick="addToCart()">Savatga qo‘shish</button>

</div>

<script>

/* URL dan ma'lumot olish */

const url = new URLSearchParams(window.location.search);

const url = new URLSearchParams(window.location.search);
const id = url.get("id");

const allProducts = [

{id:"termos1", name:"Termos 1L", price:"120 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"termos2", name:"Termos 2L", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"termos3", name:"Sport Termos", price:"110 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},

{id:"blender1", name:"Blender 3x1", price:"220 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender2", name:"Mini Blender", price:"160 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender3", name:"Professional Blender", price:"390 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},

{id:"qozon1", name:"Qozon 5L", price:"180 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"qozon2", name:"Qozon 10L", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},

{id:"mikser1", name:"Mikser 5 Speed", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"mikser2", name:"Mini Mikser", price:"95 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},

{id:"idish1", name:"Idishlar To‘plami", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"idish2", name:"Premium Idishlar", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png"}

];

const product = allProducts.find(p => p.id === id);

document.getElementById("name").innerText = product.name;
document.getElementById("price").innerText = product.price + " so'm";
document.getElementById("img").src = product.img;
/* Counter */

let count = 1;

function plus(){
count++;
document.getElementById("count").innerText = count;
}

function minus(){
if(count > 1){
count--;
document.getElementById("count").innerText = count;
}
}

function addToCart(){
alert("Mahsulot savatga qo‘shildi");
}

</script>

</body>
</html>
