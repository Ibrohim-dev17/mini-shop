<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

.header{
background:white;
padding:14px;
}

.back-btn{
text-decoration:none;
background:#6a5acd;
color:white;
padding:7px 14px;
border-radius:50px;
font-size:13px;
font-weight:600;
}

.product{
background:white;
margin:12px;
border-radius:16px;
padding:16px;
text-align:center;
}

.product img{
width:200px;
border-radius:14px;
}

.name{
font-size:18px;
margin-top:10px;
}

.price{
color:#6a5acd;
font-weight:600;
margin-top:6px;
}

.desc{
margin-top:10px;
font-size:14px;
color:#555;
}

.counter{
display:flex;
justify-content:center;
align-items:center;
gap:14px;
margin-top:14px;
}

.counter button{
width:34px;
height:34px;
border:none;
border-radius:8px;
background:#6a5acd;
color:white;
font-size:18px;
}

.add-btn{
margin-top:14px;
background:#6a5acd;
color:white;
padding:12px;
border-radius:12px;
border:none;
width:100%;
font-size:15px;
}

</style>
</head>

<body>

<div class="header">
<a href="products.html" class="back-btn">← Back</a>
</div>

<div class="product">

<img id="img">

<div class="name" id="name"></div>
<div class="price" id="price"></div>

<div class="desc">
Issiq suvni 12 soat issiq saqlaydi. Zanglamaydigan po‘latdan tayyorlangan.
</div>

<div class="counter">
<button onclick="minus()">-</button>
<span id="count">1</span>
<button onclick="plus()">+</button>
</div>

<button class="add-btn" onclick="addToCart()">Savatga qo‘shish</button>

</div>

<script>

/* URL dan ma'lumot olish */

const url = new URLSearchParams(window.location.search);

document.getElementById("name").innerText = url.get("name");
document.getElementById("price").innerText = url.get("price") + " so'm";
document.getElementById("img").src = url.get("img");

/* Counter */

let count = 1;

function plus(){
count++;
document.getElementById("count").innerText = count;
}

function minus(){
if(count > 1){
count--;
document.getElementById("count").innerText = count;
}
}

function addToCart(){
alert("Mahsulot savatga qo‘shildi");
}

</script>

</body>
</html>
