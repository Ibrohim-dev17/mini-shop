<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

/* HEADER */

.header{
background:white;
padding:14px;
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
text-decoration:none;
color:#6a5acd;
font-size:14px;
font-weight:600;
display:inline-flex;
align-items:center;
gap:6px;
}

/* SEARCH */

.search-box{
margin:12px;
background:white;
border-radius:20px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.search-box input{
width:100%;
border:none;
outline:none;
font-size:14px;
background:transparent;
}

/* CATEGORIES GRID */

.categories{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.cat-card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.cat-card img{
width:80px;
height:80px;
border-radius:12px;
}

.cat-card p{
margin-top:8px;
font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<a href="index.html" class="back-btn">← Back</a>  
<b>All Categories</b>
</div>

<!-- SEARCH -->

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search category...">
</div>

<!-- CATEGORIES -->

<div class="categories">

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Termos</p>
</div>

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Choynak</p>
</div>

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Blender</p>
</div>

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Qozon</p>
</div>

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Mikser</p>
</div>

<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Idishlar</p>
</div>

</div>

 <script>

const search = document.getElementById("searchInput");
const categories = document.querySelectorAll(".cat-card");

search.addEventListener("keyup", function(){

let text = search.value.toLowerCase();

categories.forEach(function(card){

let name = card.innerText.toLowerCase();

if(name.includes(text)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});

</script> 
  
</body>
</html>
