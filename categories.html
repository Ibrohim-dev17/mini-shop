<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Kategoriyalar</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<script src="data.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* Butun ekranning ortiqcha siljishini taqiqlaydi */
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f6fa;
  color: #111;
}

a { text-decoration: none; color: inherit; }
* { box-sizing: border-box; }

/* FAOQAT SHU QISM SKROL BO'LADI */
.main-content {
  height: calc(100vh - 65px); /* Ekran balandligidan yangi menyuni chegiradi */
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain; /* Rezinka effektini yo'qotadi */
}

/* HEADER */
.header {
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 10;
}

.back-btn {
  background: #6a5acd;
  color: white;
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
}

.header b {
  font-size: 18px;
  font-weight: 600;
}

/* SEARCH */
.search-box {
  margin: 12px;
  background: white;
  border-radius: 20px;
  padding: 10px 14px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  display: flex;
  align-items: center;
  gap: 10px;
}

.search-box i { color: #b0b0b5; }
.search-box input {
  width: 100%;
  border: none;
  outline: none;
  font-size: 14px;
  background: transparent;
}

/* CATEGORIES GRID */
.categories {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 0 12px 20px 12px;
}

.cat-link { display: block; }

.cat-card {
  background: white;
  border-radius: 14px;
  padding: 14px;
  text-align: center;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
  transition: transform 0.2s ease;
}

.cat-card:active { transform: scale(0.96); }
.cat-card img { width: 70px; height: 70px; border-radius: 10px; object-fit: contain; }
.cat-card p { margin: 8px 0 0 0; font-size: 14px; font-weight: 500; }

/* PASTDAGI ICONLAR PANELI */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 65px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid rgba(0, 0, 0, 0.04);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
  z-index: 1000;
  padding: 0 10px;
}

.bottom a {
  color: #b0b0b5;
  font-size: 22px;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  border-radius: 16px;
}

.bottom a.active {
  color: #6a5acd;
  background: rgba(106, 90, 205, 0.08);
}

.bottom a:active { transform: scale(0.9); }
</style>
</head>

<body>

<div class="main-content">

  <div class="header">
    <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Orqaga</a>  
    <b>Kategoriyalar</b>
  </div>

  <div class="search-box">
    <i class="fa-solid fa-magnifying-glass"></i>
    <input type="text" id="searchInput" placeholder="Kategoriyalardan qidirish...">
  </div>

  <div class="categories" id="categoryList"></div>

</div>

<div class="bottom">
  <a href="index.html" id="navHome"><i class="fa-solid fa-house"></i></a>
  <a href="categories.html" id="navCat"><i class="fa-solid fa-list"></i></a>
  <a href="cart.html" id="navCart" style="position: relative;">
    <i class="fa-solid fa-basket-shopping"></i>
    <span id="cartBadge" style="display: none; position: absolute; top: 2px; right: 2px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; width: 16px; height: 16px; align-items: center; justify-content: center;">0</span>
  </a>
  <a href="favorites.html" id="navFav" style="position: relative;">
    <i class="fa-solid fa-heart"></i>
    <span id="favBadge" style="display: none; position: absolute; top: 2px; right: 2px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; width: 16px; height: 16px; align-items: center; justify-content: center;">0</span>
  </a>
</div>


<script>
// Telegram Mini App sozlamalari
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (typeof Telegram.WebApp.disableVerticalSwipes === 'function') {
    Telegram.WebApp.disableVerticalSwipes();
  }
}

/* DINAMIK KATEGORIYALAR RO'YXATI */
const categoriesData = [
  {id:"termos", name:"Termos", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"blender", name:"Blender", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"qozon", name:"Qozon", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"mikser", name:"Mikser", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"idishlar", name:"Idishlar", img:"https://i.imgur.com/3ZQ3Z5b.png"}
];

const categoryList = document.getElementById("categoryList");

// Kategoriyalarni ekranga chiqarish funksiyasi
function renderCategories(list) {
  categoryList.innerHTML = "";
  if(list.length === 0) {
    categoryList.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#888; padding:20px;">Hech qanday kategoriya topilmadi 😕</p>`;
    return;
  }

  list.forEach(c => {
    categoryList.innerHTML += `
    <a href="products.html?cat=${c.id}&from=categories" class="cat-link">
      <div class="cat-card">
        <img src="${c.img}">
        <p>${c.name}</p>
      </div>
    </a>`;
  });
}

// Dastlab hammasini chiqaramiz
renderCategories(categoriesData);

/* OPTIMIZATSIYA QILINGAN QIDIRUV TIZIMI */
const searchInput = document.getElementById("searchInput");
searchInput.addEventListener("input", function() {
  let text = searchInput.value.trim().toLowerCase();
  
  // Haqiqiy vaqtda massiv ichidan saralash
  let filteredCats = categoriesData.filter(c => c.name.toLowerCase().includes(text));
  renderCategories(filteredCats);
});

// Sahifa ochilganda pastki badgelarni yangilash (data.js dagi funksiya)
if (typeof updateBottomBadges === 'function') {
  updateBottomBadges();
}
</script>

</body>
</html>
