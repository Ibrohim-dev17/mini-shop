<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Categories</title>

<style>

body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

/* HEADER */

.header{
background:white;
padding:14px;
display:flex;
align-items:center;
gap:10px;
}

.back-btn{
text-decoration:none;
background:#6a5acd;
color:white;
padding:7px 14px;
border-radius:50px;
font-size:13px;
font-weight:600;
display:inline-block;
} 

/* SEARCH */

.search-box{
margin:12px;
background:white;
border-radius:20px;
padding:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.search-box input{
width:100%;
border:none;
outline:none;
font-size:14px;
background:transparent;
}

/* CATEGORIES GRID */

.categories{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.cat-card{
background:white;
border-radius:14px;
padding:14px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

.cat-card img{
width:80px;
height:80px;
border-radius:12px;
}

.cat-card p{
margin-top:8px;
font-size:14px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
padding:14px;
}

.product-card{
background:white;
border-radius:14px;
padding:12px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
text-align:center;
}

.product-card img{
width:90px;
height:90px;
border-radius:12px;
}

.product-card p{
margin:8px 0 4px;
font-size:14px;
}

.price{
color:#6a5acd;
font-weight:600;
font-size:14px;
}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">
<a href="index.html" class="back-btn">← Back</a>  
<b>All Categories</b>
</div>

<!-- SEARCH -->

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search category...">
</div>

<!-- CATEGORIES -->

<div class="categories">

<a href="products.html?cat=termos" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Termos</p>
</div>
</a>

<a href="products.html?cat=choynak" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Choynak</p>
</div>
</a>

<a href="products.html?cat=blender" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Blender</p>
</div>
</a>

<a href="products.html?cat=qozon" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Qozon</p>
</div>
</a>

<a href="products.html?cat=mikser" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Mikser</p>
</div>
</a>

<a href="products.html?cat=idishlar" style="text-decoration:none;color:black;">
<div class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Idishlar</p>
</div>
</a>

</div>

<!-- POPULAR PRODUCTS -->

<h3 style="padding:14px;">Popular products</h3>

<div class="products" id="popularProducts"></div>

<script>

/* SEARCH */

const search = document.getElementById("searchInput");
const categories = document.querySelectorAll(".cat-card");

search.addEventListener("keyup", function(){

let text = search.value.toLowerCase();

categories.forEach(function(card){

let name = card.innerText.toLowerCase();

if(name.includes(text)){
card.style.display = "block";
}else{
card.style.display = "none";
}

});

});

/* RANDOM PRODUCTS */

const allProducts = [

{name:"Termos 1L", price:"120 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Blender 3x1", price:"220 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Qozon 5L", price:"180 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Mikser 5 Speed", price:"150 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Sport Termos", price:"110 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Mini Blender", price:"160 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Katta Qozon 10L", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Professional Blender", price:"390 000", img:"https://i.imgur.com/3ZQ3Z5b.png"},
{name:"Premium Idishlar", price:"260 000", img:"https://i.imgur.com/3ZQ3Z5b.png"}

];

const randomProducts = allProducts.sort(() => 0.5 - Math.random()).slice(0,6);

const container = document.getElementById("popularProducts");

randomProducts.forEach(p => {
container.innerHTML += `
<div class="product-card">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} so'm</div>
</div>
`;
});

</script>

<script>

if (window.history && window.history.pushState) {

window.history.pushState('forward', null, '');

window.onpopstate = function () {
window.history.pushState('forward', null, '');
};

}

</script>
 
</body>
</html>
