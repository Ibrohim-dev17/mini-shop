<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f5f5;}
.box{background:white;margin:12px;padding:16px;border-radius:16px;text-align:center;}
img{width:180px;border-radius:14px;}
.counter{display:flex;justify-content:center;gap:14px;margin-top:14px;}
button{width:34px;height:34px;border:none;border-radius:8px;background:#6a5acd;color:white;font-size:18px;}
.add{margin-top:14px;background:#6a5acd;color:white;padding:12px;border:none;border-radius:12px;width:100%;}
</style>
</head>
<body>

<div class="box" id="box"></div>

<script>

const url = new URLSearchParams(window.location.search);
const id = url.get("id");

const products = [
{id:1,name:"Termos 1L",price:"120 000",img:"https://i.imgur.com/3ZQ3Z5b.png",desc:"12 soat issiq saqlaydi"},
{id:2,name:"Termos 2L",price:"150 000",img:"https://i.imgur.com/3ZQ3Z5b.png",desc:"Katta hajmli termos"},
{id:3,name:"Blender 3x1",price:"220 000",img:"https://i.imgur.com/3ZQ3Z5b.png",desc:"3 funksiyali blender"},
{id:4,name:"Mini Blender",price:"160 000",img:"https://i.imgur.com/3ZQ3Z5b.png",desc:"Kichik blender"}
];

const p = products.find(x=>x.id==id);
let count = 1;

const box = document.getElementById("box");

box.innerHTML = `
<img src="${p.img}">
<h3>${p.name}</h3>
<p>${p.desc}</p>

<div class="counter">
<button onclick="minus()">-</button>
<span id="count">1</span>
<button onclick="plus()">+</button>
</div>

<button class="add" onclick="add()">Savatga qo'shish</button>
`;

function plus(){count++;document.getElementById("count").innerText=count;}
function minus(){if(count>1){count--;document.getElementById("count").innerText=count;}}
function add(){alert("Savatga qo'shildi");}

</script>

</body>
</html>
