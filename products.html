<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Mahsulotlar</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="data.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; 
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f6fa;
  color: #111;
}

a { text-decoration: none; color: inherit; }
* { box-sizing: border-box; }

.main-content {
  height: calc(100vh - 65px); 
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior-y: contain;
}

/* HEADER */
.header {
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(10px);
  padding: 14px;
  display: flex;
  align-items: center;
  gap: 15px;
  border-bottom: 1px solid #eee;
  position: sticky;
  top: 0;
  z-index: 10;
}

.back-btn {
  background: #6a5acd;
  color: white;
  padding: 6px 14px;
  border-radius: 50px;
  font-size: 13px;
  font-weight: 500;
}

.header b {
  font-size: 18px;
  text-transform: capitalize; 
}

/* PRODUCTS GRID */
.products {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px 12px 20px 12px;
}

.card {
  background: white;
  border-radius: 14px;
  padding: 12px;
  text-align: center;
  box-shadow: 0 5px 12px rgba(0,0,0,0.04);
  transition: 0.2s;
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

.card:active { transform: scale(0.98); }

.card img {
  width: 100%;
  height: 110px;
  object-fit: contain;
  background: #fafafa;
  border-radius: 12px;
  padding: 8px;
}

.card p {
  margin: 8px 0 4px 0;
  font-size: 14px;
  font-weight: 500;
  text-align: left;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.price {
  color: #6a5acd;
  font-size: 14px;
  font-weight: 700;
  text-align: left;
  margin-bottom: 8px;
}

/* ❤️ SHAFFOF YURAKCHA */
.heart {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: #b0b0b5;
  z-index: 2;
  transition: transform 0.2s ease, color 0.2s ease;
}

.heart:active { transform: scale(1.2); }
.heart.active { color: #ff3b30; }

/* SAVATGA QO'SHISH TUGMASI */
.add-to-cart-btn {
  background: #f1f2f6;
  color: #6a5acd;
  border: none;
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  cursor: pointer;
  margin-top: auto;
  position: relative;
  z-index: 3;
}
.add-to-cart-btn:active { background: #6a5acd; color: white; transform: scale(0.95); }

/* TOAST (BILDIRISHNOMA) */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85); color: white; padding: 10px 24px;
  border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 2000;
  transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { top: 20px; }

/* PASTDAGI NAVIGATION PANEL */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 65px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid rgba(0, 0, 0, 0.04);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
  z-index: 1000;
  padding: 0 10px;
}

.bottom a {
  color: #b0b0b5;
  font-size: 22px;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  border-radius: 16px;
}

.bottom a.active {
  color: #6a5acd;
  background: rgba(106, 90, 205, 0.08);
}

.bottom a:active { transform: scale(0.9); }
</style>
</head>

<body>

<div id="toast" class="toast">Savatga qo‘shildi!</div>

<div class="main-content">
  <div class="header">
    <a href="#" onclick="goBack()" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Orqaga</a>
    <b id="title">Mahsulotlar</b>
  </div>

  <div class="products" id="productBox"></div>
</div>

<div class="bottom">
  <a href="index.html" id="navHome"><i class="fa-solid fa-house"></i></a>
  <a href="categories.html" id="navCat"><i class="fa-solid fa-list"></i></a>
  <a href="cart.html" id="navCart" style="position: relative;">
    <i class="fa-solid fa-basket-shopping"></i>
    <span id="cartBadge" style="display: none; position: absolute; top: 2px; right: 2px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; width: 16px; height: 16px; align-items: center; justify-content: center;">0</span>
  </a>
  <a href="favorites.html" id="navFav" style="position: relative;">
    <i class="fa-solid fa-heart"></i>
    <span id="favBadge" style="display: none; position: absolute; top: 2px; right: 2px; background: #ff3b30; color: white; font-size: 10px; font-weight: bold; border-radius: 50%; width: 16px; height: 16px; align-items: center; justify-content: center;">0</span>
  </a>
</div>

<script>
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (typeof Telegram.WebApp.disableVerticalSwipes === 'function') {
    Telegram.WebApp.disableVerticalSwipes();
  }
}

/* URL PARAMS */
const urlParams = new URLSearchParams(window.location.search);
const cat = urlParams.get("cat");
const from = urlParams.get("from");

if(from === "categories") {
  document.getElementById("navCat").classList.add("active");
} else {
  document.getElementById("navHome").classList.add("active");
}

/* SEVIMLILAR INITIALIZATION */
let favs = JSON.parse(localStorage.getItem("favs")) || [];

if(cat){
  document.getElementById("title").innerText = cat;
}

/* RENDERING PRODUCTS */
const box = document.getElementById("productBox");
const filteredProducts = allProducts.filter(p => p.category === cat);

if(filteredProducts.length > 0){
  filteredProducts.forEach(p => {
    let isFav = favs.includes(p.id);
    box.innerHTML += `
    <div class="card">
      <div class="heart ${isFav ? "active" : ""}" onclick="toggleFav(event,'${p.id}',this)">
        <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
      </div>
      <a href="product.html?id=${p.id}&cat=${cat}&from=${from || 'index'}">
        <img src="${p.img}">
        <p>${p.name}</p>
        <div class="price">${p.price.toLocaleString()} so'm</div>
      </a>
      <button class="add-to-cart-btn" onclick="addToCart(event, '${p.id}')">Savatga qo'shish</button>
    </div>
    `;
  });
} else {
  box.innerHTML = "<p style='grid-column: 1/-1; padding:40px; text-align:center; color:#888;'>Ushbu kategoriyada mahsulotlar mavjud emas 😕</p>";
}

/* ❤️ SEVIMLILAR FUNKSIYASI */
function toggleFav(e, id, el){
  e.preventDefault();
  e.stopPropagation();

  let icon = el.querySelector("i");
  let index = favs.indexOf(id);

  if(index !== -1){
    favs.splice(index, 1);
    el.classList.remove("active");
    icon.className = "fa-regular fa-heart";
  } else {
    favs.push(id);
    el.classList.add("active");
    icon.className = "fa-solid fa-heart";
  }

  localStorage.setItem("favs", JSON.stringify(favs));

  if (typeof updateBottomBadges === 'function') updateBottomBadges();
  window.dispatchEvent(new Event('favsUpdated'));
}

/* SAVATGA QO'SHISH FUNKSIYASI */
function addToCart(e, id) {
  e.preventDefault();
  e.stopPropagation(); // Karta havolasiga o'tib ketishni to'xtatadi

  let p = allProducts.find(x => x.id === id);
  if (!p) return;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: p.id, name: p.name, price: p.price, img: p.img, qty: 1 });
  }

  // 1. Avval ma'lumotni saqlaymiz
  localStorage.setItem("cart", JSON.stringify(cart));

  // 2. Keyin oynadagi funksiyani chaqiramiz (Lag butunlay yo'qoladi)
  if (typeof window.updateBottomBadges === 'function') {
    window.updateBottomBadges();
  }

  // Telegram pastki tugmasini yangilash
  updateTelegramMainButton();

  // Toast bildirishnomasini ko'rsatish
  const toast = document.getElementById("toast");
  if (toast) {
    toast.classList.add("show");
    setTimeout(() => { toast.classList.remove("show"); }, 1500);
  }
}


/* TELEGRAM TEZKOR MAIN BUTTON */
function updateTelegramMainButton() {
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.MainButton) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

    if (totalQty > 0) {
      Telegram.WebApp.MainButton.setText(`Savatni ko'rish (${totalQty} ta mahsulot)`);
      Telegram.WebApp.MainButton.show();
    } else {
      Telegram.WebApp.MainButton.hide();
    }
  }
}

if (window.Telegram && Telegram.WebApp && Telegram.WebApp.MainButton) {
  Telegram.WebApp.MainButton.onClick(function() {
    window.location.href = "cart.html";
  });
}

// Boshlang'ich yuklashlar
if (typeof updateBottomBadges === 'function') updateBottomBadges();
updateTelegramMainButton();

function goBack(){
  if(from === "categories"){
    window.location.href = "categories.html";
  } else {
    window.location.href = "index.html";
  }
}
</script>

</body>
</html>
