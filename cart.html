<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Savat</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<style>
:root { --primary: #6a5acd; --danger: #ff3b30; }
body { font-family: sans-serif; background: #f8f9fa; margin: 0; padding-bottom: 120px; }

/* CART ITEM */
.cart-list { padding: 16px; }
.cart-item { background: white; border-radius: 16px; padding: 12px; display: flex; align-items: center; gap: 12px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
.item-img { width: 60px; height: 60px; border-radius: 12px; background: #eee; }
.item-info { flex: 1; }
.item-title { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
.item-price { color: var(--primary); font-weight: 700; font-size: 13px; }

.controls { display: flex; align-items: center; gap: 12px; }
.qty-btn { width: 32px; height: 32px; border-radius: 50%; border: none; background: #f0f0f0; font-weight: bold; }
.delete-btn { color: var(--danger); cursor: pointer; padding: 5px; }

/* BUYURTMA TUGMASI (STICKY) */
.checkout-panel { position: fixed; bottom: 70px; left: 16px; right: 16px; background: white; padding: 16px; border-radius: 20px; box-shadow: 0 -5px 20px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; z-index: 999; }
.checkout-total { font-weight: 700; font-size: 18px; }
.checkout-btn { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 12px; font-weight: 600; }

/* TARIX BO'LIMI */
.history-section { padding: 16px; margin-top: 20px; }
.history-item { background: #fff; padding: 12px; border-radius: 12px; margin-bottom: 8px; font-size: 13px; border: 1px solid #eee; }
</style>
</head>
<body>

<div class="cart-list" id="cartList"></div>
<div id="checkoutPanel" class="checkout-panel" style="display:none;">
    <div class="checkout-total" id="totalPriceText">0 so'm</div>
    <button class="checkout-btn" onclick="openOrderModal()">Buyurtma berish</button>
</div>

<div class="history-section">
    <h4><i class="fa-solid fa-clock-rotate-left"></i> Buyurtmalar tarixi</h4>
    <div id="orderHistory"></div>
</div>

<script>
function renderCart() {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let list = document.getElementById("cartList");
    let panel = document.getElementById("checkoutPanel");
    
    list.innerHTML = "";
    if (cart.length === 0) {
        list.innerHTML = "<p style='text-align:center; color:#999;'>Savat bo'sh</p>";
        panel.style.display = "none";
    } else {
        panel.style.display = "flex";
        let total = 0;
        cart.forEach(item => {
            total += (item.price * item.qty);
            list.innerHTML += `
                <div class="cart-item">
                    <div class="item-img"></div>
                    <div class="item-info">
                        <div class="item-title">${item.name}</div>
                        <div class="item-price">${item.price.toLocaleString()} so'm</div>
                    </div>
                    <div class="controls">
                        <i class="fa-solid fa-trash-can delete-btn" onclick="removeItem('${item.id}')"></i>
                        <button class="qty-btn" onclick="changeQty('${item.id}', -1)">-</button>
                        <span>${item.qty}</span>
                        <button class="qty-btn" onclick="changeQty('${item.id}', 1)">+</button>
                    </div>
                </div>`;
        });
        document.getElementById("totalPriceText").innerText = total.toLocaleString() + " so'm";
    }
    renderHistory();
}

function changeQty(id, delta) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let item = cart.find(x => x.id === id);
    if (item) {
        item.qty += delta;
        if (item.qty < 1) item.qty = 1;
        localStorage.setItem("cart", JSON.stringify(cart));
        renderCart();
    }
}

function removeItem(id) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    cart = cart.filter(x => x.id !== id);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

// TARIXNI SAQLASH VA KO'RSATISH
function saveOrderToHistory(cart) {
    let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
    let order = {
        date: new Date().toLocaleDateString(),
        items: cart,
        total: cart.reduce((sum, i) => sum + (i.price * i.qty), 0)
    };
    history.push(order);
    localStorage.setItem("orderHistory", JSON.stringify(history));
}

function renderHistory() {
    let history = JSON.parse(localStorage.getItem("orderHistory")) || [];
    let histDiv = document.getElementById("orderHistory");
    histDiv.innerHTML = history.length ? "" : "<p style='color:#999; font-size:12px;'>Hozircha buyurtmalar yo'q</p>";
    history.forEach(h => {
        histDiv.innerHTML += `<div class="history-item">📅 ${h.date} | 💰 ${h.total.toLocaleString()} so'm</div>`;
    });
}

renderCart();
</script>
</body>
</html>
