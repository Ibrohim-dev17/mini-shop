<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Mini Shop</title>

<style>
body {
  font-family: Arial;
  background: #f5f5f5;
  margin: 0;
}

header {
  background: #6C2BD9;
  color: white;
  padding: 15px;
  font-size: 20px;
}

.products {
  display: flex;
  flex-wrap: wrap;
  padding: 10px;
}

.card {
  background: white;
  width: 45%;
  margin: 2.5%;
  padding: 10px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.price {
  color: green;
  font-weight: bold;
}

button {
  width: 100%;
  padding: 10px;
  background: #6C2BD9;
  color: white;
  border: none;
  border-radius: 8px;
}
</style>
</head>

<body>

<header>My Mini Shop</header>

<div class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>AirPods Pro</h3>
<p class="price">299 000 so'm</p>
<button>Sotib olish</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p class="price">399 000 so'm</p>
<button>Sotib olish</button>
</div>

</div>

</body>
</html>
