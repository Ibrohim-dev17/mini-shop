<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Shop</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f2f2f2;
}

header{
background:#6a5acd;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.categories{
display:flex;
overflow-x:auto;
background:white;
padding:10px;
}

.categories button{
margin-right:10px;
border:none;
background:#eee;
padding:8px 15px;
border-radius:20px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 0 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#6a5acd;
font-weight:bold;
margin-top:5px;
}

.qty{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.qty button{
border:none;
background:#eee;
padding:5px 10px;
border-radius:5px;
}

.buy{
background:#6a5acd;
color:white;
border:none;
padding:8px;
width:100%;
border-radius:8px;
margin-top:6px;
}

.cart{
position:fixed;
bottom:15px;
right:15px;
background:#6a5acd;
color:white;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
}
</style>
</head>

<body>

<header>Kitchen Shop</header>

<div class="categories">
<button onclick="showCategory('all')">Hammasi</button>
<button onclick="showCategory('termos')">Termoslar</button>
<button onclick="showCategory('choynak')">Choynaklar</button>
<button onclick="showCategory('blender')">Blenderlar</button>
<button onclick="showCategory('idish')">Idishlar</button>
<button onclick="showCategory('qozon')">Qozonlar</button>
</div>

<div class="products" id="products"></div>

<div class="cart" onclick="sendOrder()">Buyurtma berish</div>

<script>

let products = [
{ name:"Termos 1L", price:120000, cat:"termos", img:"https://i.imgur.com/3ZQ3Z5b.png" },
{ name:"Termos 2L", price:150000, cat:"termos", img:"https://i.imgur.com/3ZQ3Z5b.png" },
{ name:"Elektr choynak", price:180000, cat:"choynak", img:"https://i.imgur.com/3ZQ3Z5b.png" },
{ name:"Blender 3x1", price:220000, cat:"blender", img:"https://i.imgur.com/3ZQ3Z5b.png" },
{ name:"Idishlar to'plami", price:300000, cat:"idish", img:"https://i.imgur.com/3ZQ3Z5b.png" },
{ name:"Qozon 5L", price:170000, cat:"qozon", img:"https://i.imgur.com/3ZQ3Z5b.png" }
];

let cart = [];

function showCategory(cat){
let html = "";

products.forEach((p,i)=>{
if(cat=="all" || p.cat==cat){

html += 
<div class="card">
<img src="${p.img}">
<h4>${p.name}</h4>
<div class="price">${p.price.toLocaleString()} so'm</div>

<div class="qty">
<button onclick="minus(${i})">-</button>
<span id="q${i}">1</span>
<button onclick="plus(${i})">+</button>
</div>

<button class="buy" onclick="addToCart(${i})">Savatga qo'shish</button>
</div>
;
}
});

document.getElementById("products").innerHTML = html;
}

showCategory("all");

function plus(i){
let el = document.getElementById("q"+i);
el.innerText = parseInt(el.innerText)+1;
}

function minus(i){
let el = document.getElementById("q"+i);
if(el.innerText>1) el.innerText = parseInt(el.innerText)-1;
}

function addToCart(i){
let qty = document.getElementById("q"+i).innerText;
let p = products[i];
cart.push(p.name + " x" + qty + " = " + (p.price*qty).toLocaleString()+" so'm");
alert("Savatga qo'shildi");
}

function sendOrder(){
let text = "Yangi buyurtma:%0A";

cart.forEach(item=>{
text += item + "%0A";
});

window.open("https://t.me/YOUR_BOT_USERNAME?start=" + text);
}

</script>

</body>
</html>
