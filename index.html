<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f5f5f5;
}

.top-header{
background:white;
padding:14px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
font-size:22px;
}

.search{
margin-top:10px;
background:#f3f3f3;
border-radius:20px;
padding:10px;
display:flex;
align-items:center;
}

.search input{
flex:1;
border:none;
background:transparent;
font-size:14px;
outline:none;
}

.banner{
overflow-x:auto;
padding:12px;
scroll-snap-type:x mandatory;
}

.banner-track{
display:flex;
gap:12px;
}

.banner-card{
min-width:85%;
background:linear-gradient(45deg,#6a5acd,#8a2be2);
color:white;
border-radius:18px;
padding:20px;
}

.category-section{
padding:12px;
}

.cat-header{
display:flex;
justify-content:space-between;
align-items:center;
}

.cat-list{
display:flex;
gap:12px;
margin-top:12px;
overflow-x:auto;
}

.cat-card{
background:white;
border-radius:14px;
padding:10px;
width:100px;
text-align:center;
}

.cat-card img{
width:70px;
height:70px;
border-radius:12px;
}

.random-section{
padding:12px;
}

.random-products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.product-card{
background:white;
border-radius:14px;
padding:10px;
text-align:center;
}

.product-card img{
width:80px;
height:80px;
border-radius:10px;
}

.price{
font-size:13px;
color:#6a5acd;
font-weight:600;
}

.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
padding:12px 0;
font-size:20px;
}
</style>
</head>

<body>

<div class="top-header">
<div class="row">
<div>☰</div>
<div>🛍️</div>
</div>

<div class="search">
<input type="text" placeholder="Qidirish...">
</div>
</div>

<div class="banner">
<div class="banner-track">

<div class="banner-card">
<h3>Termos Aksiya</h3>
<p>Katta chegirmalar</p>
</div>

<div class="banner-card">
<h3>Blender Aksiya</h3>
<p>Yangi blenderlar keldi</p>
</div>

</div>
</div>

<div class="category-section">
<div class="cat-header">
<h3>Categories</h3>
<a href="categories.html">See all</a>
</div>

<div class="cat-list">

<a href="categories.html?cat=termos" class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Termos</p>
</a>

<a href="categories.html?cat=blender" class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Blender</p>
</a>

<a href="categories.html?cat=qozon" class="cat-card">
<img src="https://i.imgur.com/3ZQ3Z5b.png">
<p>Qozon</p>
</a>

</div>
</div>

<div class="random-section">
<h3>Popular Products</h3>
<div class="random-products" id="randomProducts"></div>
</div>

<div class="bottom">
🏠 🛒 ❤️ 👤
</div>

<script>

const products = [
{id:1,name:"Termos 1L",price:"120 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"termos"},
{id:2,name:"Termos 2L",price:"150 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"termos"},
{id:3,name:"Blender 3x1",price:"220 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"blender"},
{id:4,name:"Mini Blender",price:"160 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"blender"},
{id:5,name:"Qozon 5L",price:"180 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"qozon"},
{id:6,name:"Qozon 10L",price:"260 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"qozon"},
{id:7,name:"Mikser",price:"150 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"mikser"},
{id:8,name:"Idishlar",price:"140 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"idish"}
];

const random = products.sort(()=>0.5-Math.random()).slice(0,6);
const box = document.getElementById("randomProducts");

random.forEach(p=>{
box.innerHTML += `
<a href="product.html?id=${p.id}" class="product-card">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} so'm</div>
</a>`;
});

</script>

</body>
</html>
