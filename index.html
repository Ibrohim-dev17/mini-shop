<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>

*{box-sizing:border-box;}
body{
margin:0;
font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
background:#f2f2f7;
color:#111;
}

/* HEADER */
.header{
position:sticky;
top:0;
background:rgba(255,255,255,0.8);
backdrop-filter:blur(12px);
padding:14px;
z-index:10;
}

.logo{
font-size:18px;
font-weight:700;
}

.search{
margin-top:10px;
background:#e9e9ee;
border-radius:14px;
padding:10px;
}

.search input{
width:100%;
border:none;
background:none;
outline:none;
font-size:14px;
}

/* BANNER */
.banner{
padding:12px;
}

.banner-card{
background:linear-gradient(135deg,#6a5acd,#8a2be2);
color:white;
padding:20px;
border-radius:20px;
margin-bottom:12px;
position:relative;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* CATEGORY */
.section{
padding:12px;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

.cat-list{
display:flex;
gap:12px;
overflow-x:auto;
}

.cat-card{
min-width:90px;
background:white;
border-radius:16px;
padding:12px;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.cat-card img{
width:50px;
height:50px;
object-fit:contain;
}

.cat-card p{
font-size:12px;
margin-top:6px;
}

/* PRODUCTS */
.products{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
padding:12px;
}

.product-card{
background:white;
border-radius:18px;
padding:12px;
box-shadow:0 6px 20px rgba(0,0,0,0.06);
position:relative;
transition:0.2s;
}

.product-card:active{
transform:scale(0.97);
}

.product-card img{
width:100%;
height:110px;
object-fit:contain;
background:#fafafa;
border-radius:12px;
}

.product-card p{
font-size:14px;
margin:6px 0;
}

.price{
color:#0071e3;
font-weight:600;
}

/* HEART */
.heart{
position:absolute;
top:10px;
right:10px;
width:30px;
height:30px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.1);
font-size:14px;
}
.heart.active{color:red;}

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-around;
padding:12px;
border-top:1px solid #eee;
}

.bottom a{
font-size:20px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div class="logo">Kitchen Market</div>

<div class="search">
<input type="text" placeholder="Search products...">
</div>
</div>

<!-- BANNER -->
<div class="banner">

<div class="banner-card">
<h3>🔥 Chegirma</h3>
<p>Termoslar arzon narxda</p>
</div>

<div class="banner-card">
<h3>⚡ Yangi mahsulot</h3>
<p>Blender 3x1 keldi</p>
</div>

</div>

<!-- CATEGORY -->
<div class="section">
<div class="section-header">
<h3>Categories</h3>
<a href="categories.html">See all</a>
</div>

<div class="cat-list" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Popular Products</h3>
</div>

<div class="products" id="randomProducts"></div>

<!-- BOTTOM -->
<div class="bottom">
<a href="index.html">🏠</a>
<a href="cart.html">🛒</a>
<a href="favorites.html">❤️</a>
<a href="#">👤</a>
</div>

<script>

/* CATEGORY */
const categories=[
{id:"termos",name:"Termos",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender",name:"Blender",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"qozon",name:"Qozon",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"mikser",name:"Mikser",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"idishlar",name:"Idishlar",img:"https://i.imgur.com/3ZQ3Z5b.png"}
];

const catBox=document.getElementById("catList");

categories.forEach(c=>{
catBox.innerHTML += `
<a href="products.html?cat=${c.id}">
<div class="cat-card">
<img src="${c.img}">
<p>${c.name}</p>
</div>
</a>
`;
});

/* PRODUCTS */
const data = {
termos:[{id:"termos1",name:"Termos 1L",price:"120000",img:"https://i.imgur.com/3ZQ3Z5b.png"}],
blender:[{id:"blender1",name:"Blender 3x1",price:"220000",img:"https://i.imgur.com/3ZQ3Z5b.png"}]
};

let all=[];
Object.values(data).forEach(a=>all=all.concat(a));

const box=document.getElementById("randomProducts");

all.forEach(p=>{
box.innerHTML += `
<a href="product.html?id=${p.id}">
<div class="product-card">
<div class="heart" onclick="toggleFav(event,'${p.id}',this)">♡</div>
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price} so'm</div>
</div>
</a>
`;
});

/* FAVORITE */
function toggleFav(e,id,el){
e.preventDefault();
e.stopPropagation();

let favs=JSON.parse(localStorage.getItem("favs"))||[];

if(favs.includes(id)){
favs=favs.filter(x=>x!==id);
el.classList.remove("active");
el.innerText="♡";
}else{
favs.push(id);
el.classList.add("active");
el.innerText="♥";
}

localStorage.setItem("favs",JSON.stringify(favs));
}

</script>

</body>
</html>
