<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

header{
background:#6a5acd;
color:white;
padding:15px;
font-size:22px;
text-align:center;
font-weight:bold;
}

.banner{
margin:10px;
background:white;
padding:15px;
border-radius:12px;
text-align:center;
box-shadow:0 0 8px rgba(0,0,0,0.08);
}

.categories{
display:flex;
overflow-x:auto;
padding:10px;
}

.categories button{
border:none;
background:white;
margin-right:10px;
padding:10px 15px;
border-radius:20px;
box-shadow:0 0 6px rgba(0,0,0,0.1);
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.card img{
width:100%;
border-radius:12px;
}

.name{
font-size:15px;
margin-top:5px;
}

.price{
color:#6a5acd;
font-weight:bold;
margin-top:5px;
}

.buy{
background:#6a5acd;
color:white;
border:none;
width:100%;
padding:8px;
border-radius:8px;
margin-top:5px;
}

.cart-btn{
position:fixed;
bottom:15px;
right:15px;
background:#6a5acd;
color:white;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}

.cart-box{
position:fixed;
bottom:70px;
right:10px;
background:white;
width:250px;
max-height:300px;
overflow:auto;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
display:none;
padding:10px;
}
</style>
</head>

<body>

<header>Kitchen Market</header>

<div class="banner">
Bugungi chegirmalar 🔥 Uy anjomlari arzon narxda
</div>

<div class="categories">
<button onclick="show('all')">Hammasi</button>
<button onclick="show('termos')">Termoslar</button>
<button onclick="show('choynak')">Choynaklar</button>
<button onclick="show('blender')">Blenderlar</button>
<button onclick="show('idish')">Idishlar</button>
<button onclick="show('qozon')">Qozonlar</button>
</div>

<div class="products" id="products"></div>

<div class="cart-box" id="cartBox"></div>
<div class="cart-btn" onclick="toggleCart()">Savat</div>

<script>

let products = [
{n:"Termos 1L",p:120000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Termos 2L",p:150000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Elektr choynak",p:180000,c:"choynak",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Blender 3x1",p:220000,c:"blender",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Idishlar set",p:300000,c:"idish",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Qozon 5L",p:170000,c:"qozon",i:"https://i.imgur.com/3ZQ3Z5b.png"}
];

let cart = [];

function show(cat){
let h="";
products.forEach((p,i)=>{
if(cat=="all"||p.c==cat){
h+=`
<div class="card">
<img src="${p.i}">
<div class="name">${p.n}</div>
<div class="price">${p.p.toLocaleString()} so'm</div>
<button class="buy" onclick="add(${i})">Savatga qo'shish</button>
</div>`;
}
});
document.getElementById("products").innerHTML=h;
}

show("all");

function add(i){
cart.push(products[i]);
alert("Savatga qo'shildi");
showCart();
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display=="block"?"none":"block";
showCart();
}

function showCart(){
let box=document.getElementById("cartBox");
let h="";
let total=0;

cart.forEach(p=>{
h+=p.n+" - "+p.p.toLocaleString()+" so'm<br>";
total+=p.p;
});

h+="<hr><b>Jami: "+total.toLocaleString()+" so'm</b>";
box.innerHTML=h;
}

</script>

</body>
</html>
