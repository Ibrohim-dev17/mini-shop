<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#6a5acd;
color:white;
padding:14px;
font-size:20px;
text-align:center;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
padding:10px;
}

.card{
background:white;
border-radius:12px;
padding:8px;
box-shadow:0 0 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:10px;
}

.name{
font-size:14px;
margin-top:4px;
}

.price{
color:#6a5acd;
font-weight:bold;
font-size:15px;
margin-top:3px;
}

.counter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:6px;
}

.counter button{
width:32px;
height:32px;
border:none;
background:#6a5acd;
color:white;
font-size:18px;
border-radius:6px;
}

.cart-btn{
position:fixed;
bottom:15px;
right:15px;
background:#6a5acd;
color:white;
padding:12px 18px;
border-radius:25px;
font-weight:bold;
font-size:14px;
}

.cart{
position:fixed;
bottom:70px;
right:8px;
background:white;
width:92%;
max-height:350px;
overflow:auto;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
display:none;
padding:10px;
}

input{
width:100%;
padding:9px;
margin-top:6px;
border-radius:8px;
border:1px solid #ddd;
}

.order{
background:#6a5acd;
color:white;
border:none;
width:100%;
padding:11px;
border-radius:8px;
margin-top:10px;
font-size:15px;
}
</style>
</head>

<body>

<header>Kitchen Market</header>

<div class="products" id="products"></div>

<div class="cart" id="cartBox"></div>
<div class="cart-btn" onclick="toggleCart()">Savat</div>

<script>

let products = [
{n:"Termos 1L",p:120000,i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Termos 2L",p:150000,i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Elektr choynak",p:180000,i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Blender 3x1",p:220000,i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Idishlar set",p:300000,i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Qozon 5L",p:170000,i:"https://i.imgur.com/3ZQ3Z5b.png"}
];

let cart = [];

function show(){
let h="";
products.forEach((p,i)=>{
h+=`
<div class="card">
<img src="${p.i}">
<div class="name">${p.n}</div>
<div class="price">${p.p.toLocaleString()} so'm</div>

<div class="counter">
<button onclick="minus(${i})">-</button>
<button onclick="plus(${i})">+</button>
</div>

</div>`;
});
document.getElementById("products").innerHTML=h;
}

show();

function plus(i){
cart.push(products[i]);
showCart();
}

function minus(i){
cart.pop();
showCart();
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display=="block"?"none":"block";
showCart();
}

function showCart(){
let box=document.getElementById("cartBox");
let h="";
let total=0;

cart.forEach(p=>{
h+=p.n+" - "+p.p.toLocaleString()+" so'm<br>";
total+=p.p;
});

h+=`
<hr><b>Jami: ${total.toLocaleString()} so'm</b><br><br>

Ismingiz:
<input id="name" placeholder="Ismingiz">

Telefon:
<input id="phone" placeholder="Telefon">

<button class="order" onclick="sendOrder()">Buyurtma berish</button>
`;

box.innerHTML=h;
}

function sendOrder(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;

let text="Yangi buyurtma:%0A";

cart.forEach(p=>{
text+=p.n+" - "+p.p+" so'm%0A";
});

text+="%0AIsm: "+name;
text+="%0ATelefon: "+phone;

window.open("https://t.me/Sardoba27bot?start="+text);

}

</script>

</body>
</html>
