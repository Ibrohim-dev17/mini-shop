<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Kitchen Market</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<script src="data.js"></script>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden; /* Butun ekran skrol bo'lishini qat'iy taqiqlaydi */
  font-family: system-ui, -apple-system, sans-serif;
  background: #f5f6fa;
}

a { text-decoration: none; color: inherit; }
* { box-sizing: border-box; }
img { max-width: 100%; }

/* MANA SHU DIV FAOQAT SKROL BO'LADI */
.main-content {
  height: calc(100vh - 65px); /* Ekran balandligidan pastki menyu (65px) joyini olib tashlaydi */
  overflow-y: auto; /* Faqat shu div ichi tepaga-pastga skrol bo'ladi */
  -webkit-overflow-scrolling: touch; /* iPhone'larda skrol silliq ishlashi uchun */
  overscroll-behavior-y: contain; /* Rezinka bo'lib uzilib ketishni yo'qotadi */
}

/* HEADER */
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px;
  background: #fff;
  position: sticky;
  top: 0;
  z-index: 10;
  border-bottom: 1px solid #eee;
}

.search {
  flex: 1;
  display: flex;
  align-items: center;
  background: #f2f2f2;
  padding: 8px 12px;
  border-radius: 20px;
  gap: 8px;
}

.search input {
  border: none;
  outline: none;
  background: transparent;
  width: 100%;
  font-size: 14px;
}

/* BANNER */
.banner {
  margin: 12px;
  overflow: hidden;
  position: relative;
}

.banner-wrapper {
  overflow: hidden;
  border-radius: 22px;
  width: 100%;
}

.banner-slider {
  display: flex;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  scroll-behavior: smooth;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x !important; /* Faqat yonga surishga ruxsat */
  overscroll-behavior-x: contain;
}

.banner-slider::-webkit-scrollbar {
  display: none;
}

.banner-card {
  flex: 0 0 100%;
  min-height: 170px;
  padding: 20px;
  color: #fff;
  scroll-snap-align: start;
  touch-action: pan-x !important;
}

.banner-card h2, .banner-card p { margin: 0; }
.banner-card h2 { margin-bottom: 15px; }

.banner1 { background: linear-gradient(135deg,#ff6b6b,#ff8e53); }
.banner2 { background: linear-gradient(135deg,#4facfe,#00f2fe); }
.banner3 { background: linear-gradient(135deg,#43e97b,#38f9d7); }

.dots {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 8px;
}

.dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #ccc;
  transition: background 0.3s ease;
}

.dot.active { background: #6a5acd; }

/* CATEGORY */
.section { padding: 12px; }
.section h3 { margin: 0 0 12px 0; font-size: 16px; font-weight: 700; }

.cat-list {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding-bottom: 8px;
}
.cat-list::-webkit-scrollbar { display: none; }

.cat-card {
  min-width: 90px;
  background: #fff;
  padding: 10px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 4px 10px rgba(0,0,0,0.03);
}
.cat-card img { width: 50px; height: 50px; object-fit: contain; }
.cat-card p { margin: 6px 0 0 0; font-size: 12px; font-weight: 500; }

/* PRODUCTS */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(165px, 1fr));
  gap: 12px;
  padding-bottom: 20px;
}

.card {
  background: #fff;
  border-radius: 14px;
  padding: 12px;
  position: relative;
  box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}
.card img { height: 100px; width: 100%; object-fit: contain; }
.card p { margin: 8px 0 4px 0; font-size: 14px; font-weight: 500; color: #333; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.price { color: #6a5acd; font-weight: 700; margin-top: 5px; font-size: 14px; margin-bottom: 8px; }

.heart {
  position: absolute;
  top: 8px;
  right: 8px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 18px;
  color: #b0b0b5;
  z-index: 2;
  transition: transform 0.2s ease, color 0.2s ease;
}

.heart:active { transform: scale(1.2); }
.heart.active { color: #ff3b30; }

/* SAVATGA QO'SHISH ICHKI TUGMASI */
.add-to-cart-btn {
  background: #f1f2f6;
  color: #6a5acd;
  border: none;
  width: 100%;
  padding: 8px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.2s;
  cursor: pointer;
  margin-top: auto;
}
.add-to-cart-btn:active { background: #6a5acd; color: white; }

/* TOAST (BILDIRISHNOMA) */
.toast {
  position: fixed; top: -60px; left: 50%; transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.85); color: white; padding: 10px 24px;
  border-radius: 50px; font-size: 14px; font-weight: 500; z-index: 2000;
  transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { top: 20px; }

/* PASTDAGI ICONLAR PANELI */
.bottom {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 65px;
  background: rgba(255, 255, 255, 0.95);
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid rgba(0, 0, 0, 0.04);
  box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.03);
  z-index: 1000;
  padding: 0 10px;
}

.bottom a {
  color: #b0b0b5;
  font-size: 22px;
  transition: all 0.25s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  border-radius: 16px;
}

.bottom a.active {
  color: #6a5acd;
  background: rgba(106, 90, 205, 0.08);
}

.bottom a:active { transform: scale(0.9); }
</style>

</head>

<body>

<div id="toast" class="toast">Savatga qo‘shildi!</div>

<div class="main-content">

  <div class="header">
    <i class="fa-solid fa-bars" style="font-size: 18px; color: #555;"></i>
    <div class="search">
      <i class="fa-solid fa-magnifying-glass" style="color: #888;"></i>
      <input id="searchInput" placeholder="Qidirish...">
    </div>
  </div>

  <div class="banner" id="bannerBlock">
    <div class="banner-wrapper">
      <div class="banner-slider" id="slider">
        <a href="product.html?id=termos1&from=banner" class="banner-card banner1">
          <h2>🔥 Premium Termos</h2>
          <p>Issiq va sovuq ichimliklar uchun</p>
        </a>
        <a href="product.html?id=blender1&from=banner" class="banner-card banner2">
          <h2>⚡ Blender Aksiyasi</h2>
          <p>Kitchen uchun eng yaxshi tanlov</p>
        </a>
        <a href="product.html?id=qozon1&from=banner" class="banner-card banner3">
          <h2>🍲 Qozonlar</h2>
          <p>Chegirmali narxlarda</p>
        </a>
      </div>
    </div>
    <div class="dots">
      <span class="dot active"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </div>

  <div class="section" id="categoriesBlock">
    <h3>Kategoriyalar</h3>
    <div class="cat-list" id="catList"></div>
  </div>

  <div class="section">
    <h3 id="sectionTitle">Ommabop mahsulotlar</h3>
    <div class="grid" id="productBox"></div>
  </div>

</div> 

<div class="bottom">
  <a href="index.html" class="active"><i class="fa-solid fa-house"></i></a>
  <a href="categories.html"><i class="fa-solid fa-list"></i></a>
  <a href="cart.html"><i class="fa-solid fa-basket-shopping"></i></a>
  <a href="favorites.html"><i class="fa-solid fa-heart"></i></a>
</div>


<script>
// Telegram WebApp yuklash
if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
  if (typeof Telegram.WebApp.disableVerticalSwipes === 'function') {
    Telegram.WebApp.disableVerticalSwipes();
  }
}

/* KATEGORIYALAR RO'YXATI */
const categories = [
  {id:"termos", name:"Termos", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"blender", name:"Blender", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"qozon", name:"Qozon", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"mikser", name:"Mikser", img:"https://i.imgur.com/3ZQ3Z5b.png"},
  {id:"idishlar", name:"Idishlar", img:"https://i.imgur.com/3ZQ3Z5b.png"}
];

let favs = JSON.parse(localStorage.getItem("favs")) || [];

/* KATEGORIYALARNI SAHIFAGA CHIQARISH */
const catBox = document.getElementById("catList");
categories.forEach(c => {
  catBox.innerHTML += `
  <a href="products.html?cat=${c.id}&from=index" class="cat-card">
    <img src="${c.img}">
    <p>${c.name}</p>
  </a>`;
});

/* MAHSULOTLARNI SAHIFAGA CHIQARISH FUNKSIYASI */
const box = document.getElementById("productBox");
function renderProducts(productsList) {
  box.innerHTML = "";
  if(productsList.length === 0) {
    box.innerHTML = `<p style="grid-column: 1/-1; text-align:center; color:#888; padding:20px;">Hech narsa topilmadi 😕</p>`;
    return;
  }

  productsList.forEach(p => {
    let isFav = favs.includes(p.id);
    box.innerHTML += `
    <div class="card">
      <div class="heart ${isFav ? 'active' : ''}" onclick="toggleFav('${p.id}', this)">
        <i class="${isFav ? 'fa-solid' : 'fa-regular'} fa-heart"></i>
      </div>
      <a href="product.html?id=${p.id}">
        <img src="${p.img}">
        <p>${p.name}</p>
        <div class="price">${p.price.toLocaleString()} so'm</div>
      </a>
      <button class="add-to-cart-btn" onclick="addToCart(event, '${p.id}')">Savatga qo'shish</button>
    </div>`;
  });
}

// Dastlabki tasodifiy 6 ta mahsulotni tanlab chiqarish
let initialProducts = [...allProducts].sort(() => 0.5 - Math.random()).slice(0, 6);
renderProducts(initialProducts);


/* SEVIMLILARGA QO'SHISH/O'CHIRISH */
function toggleFav(id, el) {
  let icon = el.querySelector("i");
  if (favs.includes(id)) {
    favs = favs.filter(x => x !== id);
    el.classList.remove("active");
    icon.className = "fa-regular fa-heart";
  } else {
    favs.push(id);
    el.classList.add("active");
    icon.className = "fa-solid fa-heart";
  }
  localStorage.setItem("favs", JSON.stringify(favs));
  if (typeof updateBottomBadges === 'function') updateBottomBadges();
}


/* SAVATGA QO'SHISH FUNKSIYASI */
function addToCart(e, id) {
  e.preventDefault();
  let p = allProducts.find(x => x.id === id);
  if (!p) return;

  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let existing = cart.find(item => item.id === id);

  if (existing) {
    existing.qty += 1;
  } else {
    cart.push({ id: p.id, name: p.name, price: p.price, img: p.img, qty: 1 });
  }

  localStorage.setItem("cart", JSON.stringify(cart));

  // Telegram pastki tugmasini yangilash
  updateTelegramMainButton();

  if (typeof updateBottomBadges === 'function') {
    updateBottomBadges();
  }

  // Toast bildirishnomasini ko'rsatish
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  setTimeout(() => { toast.classList.remove("show"); }, 1500);
}


/* HAQIQIY MULTI-QIDIRUV TIZIMI (MAKSIMAL OPTIMIZATSIYA) */
document.getElementById("searchInput").addEventListener("input", e => {
  let val = e.target.value.trim().toLowerCase();
  const bannerBlock = document.getElementById("bannerBlock");
  const categoriesBlock = document.getElementById("categoriesBlock");
  const sectionTitle = document.getElementById("sectionTitle");

  if (val === "") {
    // Agar qidiruv oynasi bo'sh bo'lsa, eski holatga qaytaramiz
    bannerBlock.style.display = "block";
    categoriesBlock.style.display = "block";
    sectionTitle.innerText = "Ommabop mahsulotlar";
    renderProducts(initialProducts);
  } else {
    // Agar foydalanuvchi qidirayotgan bo'lsa, banner va kategoriyalarni yashiramiz
    bannerBlock.style.display = "none";
    categoriesBlock.style.display = "none";
    sectionTitle.innerText = "Qidiruv natijalari";

    // barcha mahsulotlar (allProducts) ichidan mos keladiganlarini qidiramiz
    let filtered = allProducts.filter(p => p.name.toLowerCase().includes(val));
    renderProducts(filtered);
  }
});


/* TELEGRAM MAIN BUTTON ORQALI SAVATGA TEZKOR O'TISH TIZIMI */
function updateTelegramMainButton() {
  if (window.Telegram && Telegram.WebApp && Telegram.WebApp.MainButton) {
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    let totalQty = cart.reduce((sum, item) => sum + item.qty, 0);

    if (totalQty > 0) {
      Telegram.WebApp.MainButton.setText(`Savatni ko'rish (${totalQty} ta mahsulot)`);
      Telegram.WebApp.MainButton.show();
      Telegram.WebApp.MainButton.onClick(function() {
        window.location.href = "cart.html";
      });
    } else {
      Telegram.WebApp.MainButton.hide();
    }
  }
}

// MainButton funksiyasini dastlab ishga tushiramiz
updateTelegramMainButton();

// Har marta local storage o'zgarganda (masalan boshqa funksiyalar chaqirilganda) MainButton ham yangilansin
window.addEventListener('storage', updateTelegramMainButton);


/* SLIDER KODI */
const slider = document.getElementById("slider");
const dots = document.querySelectorAll(".dot");
let slideIndex = 0;
let userScrolling = false;
let scrollTimeout;

function updateDots() {
  const cards = document.querySelectorAll(".banner-card");
  if(cards.length === 0) return;
  const width = cards[0].offsetWidth;
  let i = Math.round(slider.scrollLeft / width);
  i = i % dots.length;
  if (i < 0) i = 0;

  dots.forEach(d => d.classList.remove("active"));
  if(dots[i]) dots[i].classList.add("active");
}

slider.addEventListener("scroll", () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(updateDots, 50);
});

function autoSlide() {
  if (userScrolling) return;
  const cards = document.querySelectorAll(".banner-card");
  if(cards.length === 0) return;
  const width = cards[0].offsetWidth;

  slideIndex++;
  if (slideIndex >= cards.length) slideIndex = 0;

  slider.scrollTo({ left: slideIndex * width, behavior: "smooth" });
}

let autoSlideInterval = setInterval(autoSlide, 3000);

slider.addEventListener("touchstart", () => {
  userScrolling = true;
  clearInterval(autoSlideInterval);
}, { passive: true });

slider.addEventListener("touchend", () => {
  setTimeout(() => {
    userScrolling = false;
    clearInterval(autoSlideInterval);
    autoSlideInterval = setInterval(autoSlide, 3000);
  }, 2000);
});

slider.addEventListener("touchmove", e => { e.stopPropagation(); }, { passive: true });

</script>
</body>
</html>
