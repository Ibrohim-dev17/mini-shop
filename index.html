<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#f5f6fa;
  color:#111;
}
a{ text-decoration:none; color:inherit; }
*{box-sizing:border-box;}
img{max-width:100%;}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
  border-bottom:1px solid #eee;
}
.search{
  flex:1;
  display:flex;
  align-items:center;
  background:#f2f2f2;
  padding:8px 12px;
  border-radius:20px;
}
.search input{
  border:none;
  outline:none;
  background:transparent;
  width:100%;
}

/* BANNER */
.banner{overflow:hidden;}
.banner-track{display:flex;transition:0.4s;}
.banner-slide{min-width:100%;}
.banner-card{
  height:170px;
  margin:10px;
  border-radius:18px;
  background:linear-gradient(135deg,#6a5acd,#8a2be2);
  color:white;
  padding:16px;
  display:flex;
  flex-direction:column;
  justify-content:center;
}
.banner-card h3{margin:0;font-size:20px;}
.banner-card p{margin-top:6px;}

/* CATEGORY */
.section{padding:12px;}
.cat-list{
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding-bottom:8px;
}
.cat-card{
  min-width:90px;
  background:#fff;
  padding:10px;
  border-radius:14px;
  text-align:center;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
  transition:0.3s;
}
.cat-card:hover{transform:translateY(-4px);}
.cat-card img{width:60px;height:60px;}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}
.card{
  background:#fff;
  border-radius:14px;
  padding:10px;
  position:relative;
  box-shadow:0 5px 12px rgba(0,0,0,0.05);
  transition:0.3s;
}
.card:hover{transform:translateY(-4px);}
.card img{height:100px;object-fit:contain;}
.price{color:#6a5acd;font-weight:600;margin-top:5px;}

/* HEART */
.heart{
  position:absolute;
  top:8px;
  right:8px;
  width:32px;
  height:32px;
  border-radius:50%;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.1);
  cursor:pointer;
  font-size:14px;
  transition:0.3s;
}
.heart.active{color:red;}
.heart:active{transform:scale(1.2);}

/* BOTTOM NAV */
.bottom{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:rgba(255,255,255,0.9);
  backdrop-filter:blur(10px);
  display:flex;
  justify-content:space-around;
  padding:10px;
  border-top:1px solid #eee;
  font-size:18px;
}
.bottom i{transition:0.3s;}
.bottom i:hover{color:#6a5acd;transform:scale(1.2);}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <i class="fa fa-bars"></i>
  <div class="search">
    <i class="fa fa-search"></i>
    <input id="searchInput" placeholder="Qidirish...">
  </div>
</div>

<!-- BANNER -->
<div class="banner">
  <div class="banner-track" id="bannerTrack">
    <div class="banner-slide">
      <div class="banner-card">
        <h3>🔥 Aksiya</h3>
        <p>Eng yaxshi mahsulotlar</p>
      </div>
    </div>
    <div class="banner-slide">
      <div class="banner-card">
        <h3>💸 Chegirma</h3>
        <p>50% gacha</p>
      </div>
    </div>
  </div>
</div>

<!-- CATEGORY -->
<div class="section">
  <h3>Kategoriyalar</h3>
  <div class="cat-list" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
  <h3>Popular Products</h3>
  <div class="grid" id="productBox"></div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom">
  <a href="index.html"><i class="fa fa-home"></i></a>
  <a href="cart.html"><i class="fa fa-cart-shopping"></i></a>
  <a href="favorites.html"><i class="fa fa-heart"></i></a>
  <a href="#"><i class="fa fa-user"></i></a>
</div>

<script>
/* DATA */
const categories=[
{id:"termos",name:"Termos",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender",name:"Blender",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"qozon",name:"Qozon",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"mikser",name:"Mikser",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"idishlar",name:"Idishlar",img:"https://i.imgur.com/3ZQ3Z5b.png"}
];
const data={
termos:[{id:"termos1",name:"Termos 1L",price:120000,img:"https://i.imgur.com/3ZQ3Z5b.png"}],
blender:[{id:"blender1",name:"Blender 3x1",price:220000,img:"https://i.imgur.com/3ZQ3Z5b.png"}],
qozon:[{id:"qozon1",name:"Qozon 5L",price:180000,img:"https://i.imgur.com/3ZQ3Z5b.png"}]
};
let favs=JSON.parse(localStorage.getItem("favs"))||[];

/* CATEGORY */
const catBox=document.getElementById("catList");
categories.forEach(c=>{
  catBox.innerHTML+=`
  <div class="cat-card" onclick="filterCategory('${c.id}')">
    <img src="${c.img}">
    <p>${c.name}</p>
  </div>`;
});

/* PRODUCTS (random 6) */
let all=[];
Object.values(data).forEach(a=>all.push(...a));
all=all.sort(()=>0.5-Math.random()).slice(0,6);
const box=document.getElementById("productBox");
all.forEach(p=>{
  let isFav=favs.includes(p.id);
  box.innerHTML+=`
  <div class="card">
    <div class="heart ${isFav?'active':''}" onclick="toggleFav('${p.id}',this)">
      <i class="fa ${isFav?'fa-heart':'fa-heart-o'}"></i>
    </div>
    <a href="product.html?id=${p.id}">
      <img src="${p.img}">
      <p>${p.name}</p>
      <div class="price">${p.price.toLocaleString()} so'm</div>
    </a>
  </div>`;
});

/* FAVORITES */
function toggleFav(id,el){
  let icon=el.querySelector("i");
  if(favs.includes(id)){
    favs=favs.filter(x=>x!==id);
    el.classList.remove("active");
    icon.className="fa fa-heart-o";
  }else{
    favs.push(id);
    el.classList.add("active");
    icon.className="fa fa-heart";
  }
  localStorage.setItem("favs",JSON.stringify(favs));
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input",e=>{
  let val=e.target.value.toLowerCase();
  document.querySelectorAll(".card").forEach(card=>{
