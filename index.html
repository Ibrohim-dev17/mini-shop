<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>


body{
margin:0;
font-family:system-ui;
background:#f5f6fa;

overscroll-behavior-x: none;

body{
  overscroll-behavior-x: none;
  overscroll-behavior-y: none;
}

}

a{ text-decoration:none; color:inherit; }
*{box-sizing:border-box;}

img{max-width:100%;}

/* HEADER */
.header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:#fff;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #eee;
}

.search{
flex:1;
display:flex;
align-items:center;
background:#f2f2f2;
padding:8px 12px;
border-radius:20px;
}

.search input{
border:none;
outline:none;
background:transparent;
width:100%;
}

/* BANNER */
.banner{
padding:12px;
}

.banner-slider{
display:flex;
gap:12px;
overflow-x:auto;
scroll-snap-type:x mandatory;
scroll-behavior:smooth;
padding-bottom:10px;

touch-action: pan-x;
-webkit-overflow-scrolling: touch;
}
.banner-slider {
  touch-action: pan-x;
  overflow-x: scroll;
  overscroll-behavior-x: contain;
}


.banner-slider::-webkit-scrollbar{
display:none;
}

.banner-card{
flex:0 0 85%;
scroll-snap-align:start;
min-height:170px;
border-radius:22px;
padding:20px;
color:white;
box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.banner1{
background:linear-gradient(135deg,#ff6b6b,#ff8e53);
}

.banner2{
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

.banner3{
background:linear-gradient(135deg,#43e97b,#38f9d7);
}

.dots{
display:flex;
justify-content:center;
gap:8px;
margin-top:6px;
}

.dot{
width:8px;
height:8px;
border-radius:50%;
background:#ccc;
}

.dot.active{
background:#6a5acd;
}

.banner-wrapper{
  overflow:hidden;
}

.banner-slider{
  display:flex;
  gap:12px;
  overflow-x:auto;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  touch-action: pan-x;
  scroll-behavior:smooth;
}

.banner-slider::-webkit-scrollbar{
  display:none;
}

.banner-card{
  flex:0 0 90%;
  min-height:160px;
  border-radius:20px;
  padding:20px;
  color:white;
  scroll-snap-align:start;
}


color:white;
padding:16px;
display:flex;
flex-direction:column;
justify-content:center;
}

/* CATEGORY */
.section{
padding:12px;
}

.cat-list{
display:flex;
overflow-x:auto;
gap:12px;
padding-bottom:8px;
}

.cat-card{
min-width:90px;
background:#fff;
padding:10px;
border-radius:14px;
text-align:center;
box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

.cat-card img{
width:60px;
height:60px;
}

/* PRODUCTS */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:12px;
}

.card{
background:#fff;
border-radius:14px;
padding:10px;
position:relative;
box-shadow:0 5px 12px rgba(0,0,0,0.05);
}

.card img{
height:80px;
object-fit:contain;
}

.price{
color:#6a5acd;
font-weight:600;
margin-top:5px;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
width:32px;
height:32px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
font-size:14px;
}

.heart.active{ color:red; }

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #eee;
font-size:18px;
}

html, body {
  overflow-x: hidden;
  overscroll-behavior: none;
}

body {
  margin: 0;
  font-family: system-ui;
  background: #f5f6fa;
  touch-action: pan-y;
}

/* FIX banner swipe + Telegram */
.banner-slider {
  display: flex;
  gap: 12px;
  overflow-x: scroll;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  touch-action: pan-x;
  overscroll-behavior-x: contain;
}

.banner-slider::-webkit-scrollbar {
  display: none;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<i class="fa fa-bars"></i>

<div class="search">
<i class="fa fa-search"></i>
<input id="searchInput" placeholder="Qidirish...">
</div>
</div>

<!-- BANNER -->
<div class="banner">

<div class="banner-slider" id="slider">

<a href="product.html?id=termos1&from=banner" class="banner-card banner1">
<h2>🔥 Premium Termos</h2>
<p>Issiq va sovuq ichimliklar uchun</p>
</a>

<a href="product.html?id=blender1&from=banner" class="banner-card banner2">
<h2>⚡ Blender Aksiyasi</h2>
<p>Kitchen uchun eng yaxshi tanlov</p>
</a>

<a href="product.html?id=qozon1&from=banner" class="banner-card banner3">
<h2>🍲 Qozonlar</h2>
<p>Chegirmali narxlarda</p>
</a>

</div>

<div class="dots">
<span class="dot active"></span>
<span class="dot"></span>
<span class="dot"></span>
</div>

</div>

<!-- CATEGORY -->
<div class="section">
<h3>Kategoriyalar</h3>
<div class="cat-list" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Popular Products</h3>
<div class="grid" id="productBox"></div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <a href="index.html"><i class="fa fa-home"></i></a>
  <a href="cart.html"><i class="fa fa-cart-shopping"></i></a>
  <a href="favorites.html"><i class="fa fa-heart"></i></a>
  <a href="categories.html"><i class="fa fa-list"></i></a>
</div>

<script>

/* DATA */
const categories=[
{id:"termos",name:"Termos",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender",name:"Blender",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"qozon",name:"Qozon",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"mikser",name:"Mikser",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"idishlar",name:"Idishlar",img:"https://i.imgur.com/3ZQ3Z5b.png"}
];

const data={
termos:[
{id:"termos1",name:"Termos 1L",price:120000,img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"termos2",name:"Termos 2L",price:150000,img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"termos3",name:"Sport",price:110000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
],
blender:[
{id:"blender1",name:"Blender 3x1",price:220000,img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender2",name:"Mini Blender",price:160000,img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender3",name:"Pro Blender",price:390000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
],
qozon:[
{id:"qozon1",name:"Qozon 5L",price:180000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
]
};

let favs=JSON.parse(localStorage.getItem("favs"))||[];

/* CATEGORY */
const catBox=document.getElementById("catList");

categories.forEach(c=>{
catBox.innerHTML+=`
<a href="products.html?cat=${c.id}&from=index" class="cat-card">
  <img src="${c.img}">
  <p>${c.name}</p>
</a>
});

/* PRODUCTS (6 TA RANDOM) */
let all=[];
Object.values(data).forEach(a=>all.push(...a));

all=all.sort(()=>0.5-Math.random()).slice(0,6);

const box=document.getElementById("productBox");

all.forEach(p=>{
let isFav=favs.includes(p.id);

box.innerHTML+=`

<div class="card">
  <div class="heart ${isFav?'active':''}" onclick="toggleFav('${p.id}',this)">
    <i class="fa ${isFav?'fa-heart':'fa-heart-o'}"></i>
  </div>
  <a href="product.html?id=${p.id}">
    <img src="${p.img}">
    <p>${p.name}</p>
    <div class="price">${p.price.toLocaleString()} so'm</div>
  </a>
</div>



});

/* FAVORITES */
function toggleFav(id,el){
  let icon=el.querySelector("i");
  if(favs.includes(id)){
    favs=favs.filter(x=>x!==id);
    el.classList.remove("active");
    icon.className="fa fa-heart-o";
  }else{
    favs.push(id);
    el.classList.add("active");
    icon.className="fa fa-heart";
  }
  localStorage.setItem("favs",JSON.stringify(favs));
}
/* SEARCH */
document.getElementById("searchInput").addEventListener("input",e=>{
let val=e.target.value.toLowerCase();

document.querySelectorAll(".card").forEach(card=>{
let name=card.querySelector("p").innerText.toLowerCase();
card.style.display=name.includes(val)?"block":"none";
});
});

function filterCategory(catId){
  box.innerHTML="";
  data[catId].forEach(p=>{
    let isFav=favs.includes(p.id);
    box.innerHTML+=`
    <div class="card">
      <div class="heart ${isFav?'active':''}" onclick="toggleFav('${p.id}',this)">
        <i class="fa ${isFav?'fa-heart':'fa-heart-o'}"></i>
      </div>
      <img src="${p.img}">
      <p>${p.name}</p>
      <div class="price">${p.price.toLocaleString()} so'm</div>
    </div>`;
  });
}



/* SEARCH */
document.getElementById("searchInput").addEventListener("input", e => {
  let val = e.target.value.toLowerCase();

  document.querySelectorAll(".card").forEach(card => {
    let name = card.querySelector("p").innerText.toLowerCase();
    card.style.display = name.includes(val) ? "block" : "none";
  });
});




/* CARTGA QO‘SHISH */
function addToCart(product){
  let cart = JSON.parse(localStorage.getItem("cart")) || [];
  let item = cart.find(p => p.id === product.id);
  if(item){
    item.qty += 1;
  }else{
    product.qty = 1;
    cart.push(product);
  }
  localStorage.setItem("cart", JSON.stringify(cart));
}

/* FAVORITES toggleFav funksiyasi allaqachon bor, shuni ishlatamiz */

function goBack(){

  const params = new URLSearchParams(location.search);

  if(params.get("from")==="banner"){
      location.href="index.html";
      return;
  }

  history.back();
}




if (window.Telegram && Telegram.WebApp) {
  Telegram.WebApp.disableVerticalSwipes();
  Telegram.WebApp.expand();
}




function updateDots(){
  const cards = document.querySelectorAll(".banner-card");
  const realCount = 3;

  const gap = 12;
  const width = slider.querySelector(".banner-card").offsetWidth + gap;
  let i = Math.round(slider.scrollLeft / width) % realCount;

  dots.forEach(d => d.classList.remove("active"));

  if(dots[i]){
    dots[i].classList.add("active");
  }
}


const slider = document.getElementById("slider");
const items = Array.from(slider.children);

// clone for infinite loop
items.forEach(item => {
  const clone = item.cloneNode(true);
  slider.appendChild(clone);
});


let dots;

window.addEventListener("load", () => {
  dots = document.querySelectorAll(".dot");
});


let scrollTimeout;

slider.addEventListener("scroll", () => {
  clearTimeout(scrollTimeout);
  scrollTimeout = setTimeout(updateDots, 50);
});






let index = 0;

function autoSlide() {
  if (userScrolling) return;

  const cards = document.querySelectorAll(".banner-card");
  const gap = 12;
  const width = slider.querySelector(".banner-card").offsetWidth + gap;

  index++;

  if (index >= cards.length / 2) {
    slider.scrollTo({ left: 0, behavior: "auto" });
    index = 0;
  } else {
    slider.scrollTo({
      left: index * width,
      behavior: "smooth"
    });
  }

  updateDots();
}

setInterval(autoSlide, 3000);

let userScrolling = false;

slider.addEventListener("touchstart", () => userScrolling = true);
slider.addEventListener("touchend", () => {
  setTimeout(() => userScrolling = false, 2000);
});


</script>

</body>
</html>
