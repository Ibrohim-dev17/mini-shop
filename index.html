<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#f5f6fa;
color:#111;
}

a{ text-decoration:none; color:inherit; }
*{ box-sizing:border-box; }

img{ max-width:100%; }

/* HEADER */
.header{
background:#fff;
padding:14px;
display:flex;
align-items:center;
justify-content:space-between;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #eee;
}

.search{
flex:1;
margin-left:10px;
background:#f2f2f2;
border-radius:20px;
padding:8px 12px;
display:flex;
align-items:center;
}

.search input{
border:none;
background:transparent;
outline:none;
width:100%;
}

/* BANNER */
.banner{
padding:12px;
overflow:hidden;
}

.banner-track{
display:flex;
transition:0.3s;
}

.banner-slide{
min-width:100%;
}

.banner-card{
height:160px;
margin:0 12px;
border-radius:18px;
background:linear-gradient(135deg,#6a5acd,#8a2be2);
color:white;
padding:16px;
display:flex;
flex-direction:column;
justify-content:center;
position:relative;
}

/* CATEGORY */
.section{
padding:12px;
}

.cat-list{
display:flex;
gap:12px;
overflow-x:auto;
padding-bottom:8px;
}

.cat-card{
min-width:90px;
background:#fff;
padding:10px;
border-radius:14px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

/* PRODUCTS */
.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{
background:#fff;
border-radius:14px;
padding:10px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
position:relative;
}

.card img{
height:80px;
object-fit:contain;
}

.price{
color:#6a5acd;
font-weight:600;
margin-top:6px;
}

/* HEART */
.heart{
position:absolute;
top:8px;
right:8px;
width:30px;
height:30px;
border-radius:50%;
background:#fff;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
}

.heart.active{ color:red; }

/* BOTTOM */
.bottom{
position:fixed;
bottom:0;
left:0;
right:0;
background:#fff;
display:flex;
justify-content:space-around;
padding:10px;
border-top:1px solid #eee;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
<div>☰</div>

<div class="search">
<input placeholder="Qidirish...">
</div>
</div>

<!-- BANNER -->
<div class="banner">
<div class="banner-track" id="bannerTrack">

<div class="banner-slide">
<div class="banner-card">
<h3>Kitchen Aksiya</h3>
<p>Eng yaxshi mahsulotlar</p>
</div>
</div>

<div class="banner-slide">
<div class="banner-card">
<h3>Chegirmalar</h3>
<p>50% gacha chegirma</p>
</div>
</div>

</div>
</div>

<!-- CATEGORIES -->
<div class="section">
<h3>Kategoriyalar</h3>

<div class="cat-list" id="catList"></div>
</div>

<!-- PRODUCTS -->
<div class="section">
<h3>Mahsulotlar</h3>

<div class="grid" id="productBox"></div>
</div>

<!-- BOTTOM -->
<div class="bottom">
<a href="#">🏠</a>
<a href="cart.html">🛒</a>
<a href="favorites.html">❤️</a>
<a href="#">👤</a>
</div>

<script>

/* DATA */
const categories=[
{id:"termos",name:"Termos",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"blender",name:"Blender",img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"qozon",name:"Qozon",img:"https://i.imgur.com/3ZQ3Z5b.png"}
];

const data={
termos:[
{id:"termos1",name:"Termos 1L",price:120000,img:"https://i.imgur.com/3ZQ3Z5b.png"},
{id:"termos2",name:"Termos 2L",price:150000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
],
blender:[
{id:"blender1",name:"Blender 3x1",price:220000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
],
qozon:[
{id:"qozon1",name:"Qozon 5L",price:180000,img:"https://i.imgur.com/3ZQ3Z5b.png"}
]
};

/* FAVORITES */
let favs = JSON.parse(localStorage.getItem("favs")) || [];

/* CATEGORIES */
const catBox=document.getElementById("catList");

categories.forEach(c=>{
catBox.innerHTML += `
<a href="products.html?cat=${c.id}">
<div class="cat-card">
<img src="${c.img}">
<p>${c.name}</p>
</div>
</a>`;
});

/* PRODUCTS */
let all=[];
Object.values(data).forEach(arr=>all.push(...arr));

const box=document.getElementById("productBox");

all.forEach(p=>{
let isFav=favs.includes(p.id);

box.innerHTML += `
<div class="card">

<div class="heart ${isFav?'active':''}" onclick="toggleFav('${p.id}',this)">
${isFav?'♥':'♡'}
</div>

<a href="product.html?id=${p.id}">
<img src="${p.img}">
<p>${p.name}</p>
<div class="price">${p.price.toLocaleString()} so'm</div>
</a>

</div>`;
});

/* FAVORITE */
function toggleFav(id,el){

if(favs.includes(id)){
favs=favs.filter(x=>x!==id);
el.classList.remove("active");
el.innerText="♡";
}else{
favs.push(id);
el.classList.add("active");
el.innerText="♥";
}

localStorage.setItem("favs",JSON.stringify(favs));
}

</script>

</body>
</html>
