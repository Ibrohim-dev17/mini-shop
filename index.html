<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Home Kitchen Store</title>

<style>
body{
margin:0;
font-family:Arial;
background:#fafafa;
}

.top{
background:#ff6b6b;
color:white;
padding:20px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.banner{
background:#fff;
margin:10px;
padding:15px;
border-radius:12px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
font-size:18px;
}

.categories{
display:flex;
overflow-x:auto;
padding:10px;
}

.categories button{
background:#fff;
border:none;
padding:10px 15px;
margin-right:10px;
border-radius:20px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.card img{
width:100%;
border-radius:12px;
}

.name{
font-size:15px;
margin-top:5px;
}

.price{
color:#ff6b6b;
font-weight:bold;
margin-top:5px;
}

.qty{
display:flex;
justify-content:space-between;
margin-top:5px;
}

.qty button{
border:none;
background:#eee;
padding:5px 10px;
border-radius:6px;
}

.buy{
background:#ff6b6b;
color:white;
border:none;
width:100%;
padding:8px;
border-radius:8px;
margin-top:5px;
}

.cart{
position:fixed;
bottom:15px;
right:15px;
background:#ff6b6b;
color:white;
padding:12px 18px;
border-radius:30px;
cursor:pointer;
font-weight:bold;
}
</style>
</head>

<body>

<div class="top">HOME KITCHEN STORE</div>

<div class="banner">
Bugungi chegirmalar 🔥 Kitchen mahsulotlari arzon narxda
</div>

<div class="categories">
<button onclick="show('all')">Hammasi</button>
<button onclick="show('termos')">Termoslar</button>
<button onclick="show('choynak')">Choynaklar</button>
<button onclick="show('blender')">Blenderlar</button>
<button onclick="show('idish')">Idishlar</button>
<button onclick="show('qozon')">Qozonlar</button>
</div>

<div class="products" id="products"></div>

<div class="cart" onclick="order()">Buyurtma berish</div>

<script>

let products = [
{n:"Termos 1L",p:120000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Termos 2L",p:150000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Elektr choynak",p:180000,c:"choynak",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Blender 3x1",p:220000,c:"blender",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Idishlar set",p:300000,c:"idish",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Qozon 5L",p:170000,c:"qozon",i:"https://i.imgur.com/3ZQ3Z5b.png"}
];

let cart = [];

function show(cat){
let h="";
products.forEach((p,i)=>{
if(cat=="all"||p.c==cat){
h+=`
<div class="card">
<img src="${p.i}">
<div class="name">${p.n}</div>
<div class="price">${p.p.toLocaleString()} so'm</div>

<div class="qty">
<button onclick="m(${i})">-</button>
<span id="q${i}">1</span>
<button onclick="p1(${i})">+</button>
</div>

<button class="buy" onclick="add(${i})">Savatga qo'shish</button>
</div>`;
}
});
document.getElementById("products").innerHTML=h;
}

show("all");

function p1(i){
let e=document.getElementById("q"+i);
e.innerText=parseInt(e.innerText)+1;
}

function m(i){
let e=document.getElementById("q"+i);
if(e.innerText>1)e.innerText=parseInt(e.innerText)-1;
}

function add(i){
let q=document.getElementById("q"+i).innerText;
cart.push(products[i].n+" x"+q);
alert("Savatga qo'shildi");
}

function order(){
let t="Yangi buyurtma:%0A";
cart.forEach(i=>t+=i+"%0A");
window.open("https://t.me/YOUR_BOT_USERNAME?start="+t);
}

</script>

</body>
</html>
