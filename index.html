<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{
margin:0;
font-family:Arial, sans-serif;
background:#f5f5f5;
}

header{
background:#6a5acd;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.search{
padding:10px;
background:white;
}

.search input{
width:100%;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
font-size:15px;
}

.categories{
display:flex;
overflow-x:auto;
padding:10px;
background:white;
}

.categories button{
border:none;
background:#f0f0f0;
padding:10px 15px;
border-radius:20px;
margin-right:8px;
cursor:pointer;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
padding:12px;
}

.card{
background:white;
border-radius:15px;
padding:10px;
box-shadow:0 0 10px rgba(0,0,0,0.08);
}

.card img{
width:100%;
border-radius:12px;
}

.name{
font-size:15px;
margin-top:5px;
}

.price{
color:#6a5acd;
font-weight:bold;
margin-top:5px;
}

.counter{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:5px;
}

.counter button{
border:none;
background:#6a5acd;
color:white;
width:30px;
height:30px;
border-radius:6px;
font-size:18px;
}

.cart-btn{
position:fixed;
bottom:15px;
right:15px;
background:#6a5acd;
color:white;
padding:12px 18px;
border-radius:30px;
font-weight:bold;
cursor:pointer;
}

.cart{
position:fixed;
bottom:70px;
right:10px;
background:white;
width:270px;
max-height:350px;
overflow:auto;
border-radius:12px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
display:none;
padding:10px;
}

.remove{
color:red;
cursor:pointer;
font-size:14px;
}
</style>
</head>

<body>

<header>Kitchen Market</header>

<div class="search">
<input type="text" placeholder="Mahsulot qidirish..." oninput="search(this.value)">
</div>

<div class="categories">
<button onclick="filter('all')">Hammasi</button>
<button onclick="filter('termos')">Termoslar</button>
<button onclick="filter('choynak')">Choynaklar</button>
<button onclick="filter('blender')">Blenderlar</button>
<button onclick="filter('idish')">Idishlar</button>
<button onclick="filter('qozon')">Qozonlar</button>
</div>

<div class="products" id="products"></div>

<div class="cart" id="cartBox"></div>
<div class="cart-btn" onclick="toggleCart()">Savat</div>

<script>

let products = [
{n:"Termos 1L",p:120000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Termos 2L",p:150000,c:"termos",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Elektr choynak",p:180000,c:"choynak",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Blender 3x1",p:220000,c:"blender",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Idishlar set",p:300000,c:"idish",i:"https://i.imgur.com/3ZQ3Z5b.png"},
{n:"Qozon 5L",p:170000,c:"qozon",i:"https://i.imgur.com/3ZQ3Z5b.png"}
];

let cart = [];

function show(list){
let h="";
list.forEach((p,i)=>{
h+=`
<div class="card">
<img src="${p.i}">
<div class="name">${p.n}</div>
<div class="price">${p.p.toLocaleString()} so'm</div>

<div class="counter">
<button onclick="add(${i})">+</button>
<button onclick="remove(${i})">-</button>
</div>

</div>`;
});
document.getElementById("products").innerHTML=h;
}

show(products);

function add(i){
cart.push(products[i]);
alert("Savatga qo'shildi");
showCart();
}

function remove(i){
cart.pop();
showCart();
}

function toggleCart(){
let box=document.getElementById("cartBox");
box.style.display = box.style.display=="block"?"none":"block";
showCart();
}

function showCart(){
let box=document.getElementById("cartBox");
let h="";
let total=0;

cart.forEach((p,i)=>{
h+=p.n+" - "+p.p.toLocaleString()+" so'm <span class='remove' onclick='deleteItem("+i+")'>o'chirish</span><br>";
total+=p.p;
});

h+=`<hr><b>Jami: ${total.toLocaleString()} so'm</b><br><br>
<a href="https://t.me/Sardoba27bot" target="_blank">
<button style="background:#6a5acd;color:white;border:none;padding:10px;width:100%;border-radius:8px;">
Buyurtma berish
</button>
</a>`;

box.innerHTML=h;
}

function deleteItem(i){
cart.splice(i,1);
showCart();
}

function filter(cat){
if(cat=="all") return show(products);
show(products.filter(p=>p.c==cat));
}

function search(txt){
txt=txt.toLowerCase();
show(products.filter(p=>p.n.toLowerCase().includes(txt)));
}

</script>

</body>
</html>
