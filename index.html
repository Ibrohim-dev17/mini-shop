<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Market</title>

<style>
body{margin:0;font-family:system-ui;background:#f5f5f5;}
.top{background:white;padding:14px;font-size:20px;display:flex;justify-content:space-between;}
.banner{overflow-x:auto;padding:12px;display:flex;gap:12px;}
.banner div{min-width:85%;background:#6a5acd;color:white;border-radius:16px;padding:20px;}
.cat{padding:12px;}
.cat-list{display:flex;gap:12px;overflow-x:auto;}
.cat-card{background:white;padding:10px;border-radius:14px;width:100px;text-align:center;}
.products{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:12px;}
.product{background:white;padding:10px;border-radius:14px;text-align:center;}
.product img{width:80px;border-radius:10px;}
</style>
</head>
<body>

<div class="top">
<div>☰</div>
<div>🛍️</div>
</div>

<div class="banner">
<div>Termos Aksiya</div>
<div>Blender Aksiya</div>
</div>

<div class="cat">
<h3>Categories</h3>
<div class="cat-list">

<a href="categories.html?cat=termos" class="cat-card">Termos</a>
<a href="categories.html?cat=blender" class="cat-card">Blender</a>
<a href="categories.html?cat=qozon" class="cat-card">Qozon</a>

</div>
</div>

<h3 style="padding-left:12px">Popular Products</h3>
<div class="products" id="randomProducts"></div>

<script>

const products = [
{id:1,name:"Termos 1L",price:"120 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"termos"},
{id:2,name:"Termos 2L",price:"150 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"termos"},
{id:3,name:"Blender 3x1",price:"220 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"blender"},
{id:4,name:"Mini Blender",price:"160 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"blender"},
{id:5,name:"Qozon 5L",price:"180 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"qozon"},
{id:6,name:"Qozon 10L",price:"260 000",img:"https://i.imgur.com/3ZQ3Z5b.png",cat:"qozon"}
];

const random = products.sort(()=>0.5-Math.random()).slice(0,6);
const box = document.getElementById("randomProducts");

random.forEach(p=>{
box.innerHTML += `
<a href="product.html?id=${p.id}" class="product">
<img src="${p.img}">
<p>${p.name}</p>
<b>${p.price} so'm</b>
</a>`;
});

</script>

</body>
</html>
