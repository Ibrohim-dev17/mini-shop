<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yangi Mahsulot Qo'shish</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .form-box { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { margin-top: 0; color: #333; text-align: center; }
        input, select, textarea { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        textarea { height: 80px; resize: none; }
        button { width: 100%; padding: 14px; background: linear-gradient(135deg, #6a11cb, #2575fc); color: white; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="form-box">
    <h2>📦 Yangi Mahsulot</h2>
    <form id="productForm">
        <label>Kategoriya:</label>
        <select id="category" required>
            <option value="termos">Termos</option>
            <option value="blender">Blender</option>
            <option value="qozon">Qozon</option>
            <option value="mikser">Mikser</option>
            <option value="idishlar">Idishlar</option>
        </select>

        <label>Mahsulot nomi:</label>
        <input type="text" id="name" placeholder="Masalan: Termos Supreme 1.5L" required>

        <label>Narxi (so'mda):</label>
        <input type="number" id="price" placeholder="Masalan: 135000" required>

        <label>Batafsil ma'lumot (Ta'rifi):</label>
        <textarea id="description" placeholder="Mahsulot haqida ma'lumot yozing..."></textarea>

        <label>Rasm tanlang:</label>
        <input type="file" id="imageFile" accept="image/*" required>

        <button type="submit" id="saveBtn">🚀 Mahsulotni Joylash</button>
    </form>
</div>

<script>
document.getElementById('productForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('saveBtn');
    const fileInput = document.getElementById('imageFile');
    
    const formData = new FormData();
    formData.append('category', document.getElementById('category').value);
    formData.append('name', document.getElementById('name').value);
    formData.append('price', document.getElementById('price').value);
    formData.append('description', document.getElementById('description').value);
    formData.append('image', fileInput.files[0]);

    btn.innerText = "Yuklanmoqda...";
    btn.disabled = true;

    try {
        const response = await fetch('api.php?action=add_product', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if(result.status === 'success') {
            alert(result.message);
            document.getElementById('productForm').reset();
        } else {
            alert("Xatolik: " + result.message);
        }
    } catch (error) {
        alert("Server bilan ulanishda xatolik yuz berdi.");
    } finally {
        btn.innerText = "🚀 Mahsulotni Joylash";
        btn.disabled = false;
    }
});
</script>

</body>
</html>
